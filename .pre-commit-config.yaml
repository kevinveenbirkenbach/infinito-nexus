---
default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: make-test
        name: Run make test
        entry: make test
        language: system
        pass_filenames: false
        stages: 
          - pre-commit
          - pre-push
      - id: make-test-external
        name: Run make test-external (pre-push gate)
        entry: make test-external
        language: system
        pass_filenames: false
        always_run: true
        stages: 
          - pre-push
