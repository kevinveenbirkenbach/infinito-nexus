---
default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: make-test
        name: Run make test
        entry: make test
        language: system
        pass_filenames: false
        stages:
          - pre-commit
      - id: make-test-signed
        name: Run make test-signed (pre-push gate)
        entry: make test-signed
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-push
