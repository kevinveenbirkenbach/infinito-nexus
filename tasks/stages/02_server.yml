---
- name: Setup server base
  include_role:
    name: "{{ server_role }}"
  loop:
    - user-administrator
    - user-root
    - sys-svc-sshd
    - sys-svc-journalctl
    - sys-ctl-hlth-disc-space
    - sys-ctl-cln-disc-space
    - sys-ctl-hlth-btrfs
    - sys-ctl-rpr-btrfs-balancer
  loop_control:
    loop_var: server_role

- name: "Load shared frontend services"
  include_tasks: "{{ playbook_dir }}/tasks/utils/load_services.yml"

- name: "Include server roles"
  include_tasks: "./tasks/groups/{{ server_group }}-roles.yml"
  loop:
    - web-svc   # 1. Load web server services
    - web-app   # 2. Load (UI) web applications
    - web-opt   # 4. Load optimation scrips last
  loop_control:
    loop_var: server_group
    label: "{{ server_group }}-roles.yml"

- name: Run E2E Playwright tests
  include_role:
    name: "test-e2e-playwright"
  when: DOCKER_IN_CONTAINER | bool
