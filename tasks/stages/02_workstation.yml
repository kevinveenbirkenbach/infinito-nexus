---
- name: setup workstation user
  include_role:
    name: "user-workstation"

- name: "setup docker role includes for workstations"
  include_tasks: "./tasks/groups/desk-roles.yml"

- name: general host setup
  include_role:
    name: drv-non-free

- name: Run CLI tests for workstation roles
  include_role:
    name: test-e2e-cli
  when: RUNTIME in ['dev', 'act', 'github']
