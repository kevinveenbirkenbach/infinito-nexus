# Host-level network defaults + per-category port bands.
#
# Per req-009 (docs/requirements/009-per-role-networks-and-ports.md), this file
# now retains ONLY the host-level keys and the new PORT_BANDS map:
#
#   * NETWORK_IPV6_ENABLED            — global IPv6 toggle.
#   * defaults_networks.internet.*    — host-level addresses (ip4 / ip6 / dns).
#   * PORT_BANDS                      — per-<scope>.<category> port ranges read
#                                       at runtime by `cli meta ports suggest`
#                                       and by the host-bound port collision
#                                       lint. Extending PORT_BANDS is the
#                                       intended way to introduce a new
#                                       category (`metrics`, `grpc`, …) — the
#                                       suggester and lint pick it up
#                                       automatically with no second
#                                       registration step.
#
# What MOVED out of this file (per req-009):
#
#   * defaults_networks.local.<role>.subnet  → roles/<role>/meta/server.yml
#                                               under networks.local.subnet
#   * defaults_networks.local.<role>.dns_resolver
#                                            → roles/<role>/meta/server.yml
#                                               under networks.local.dns_resolver
#   * group_vars/all/09_ports.yml (entire file, deleted)
#                                            → per-entity ports under
#                                               roles/<role>/meta/services.yml.<entity>.ports.{inter,local,public}
#
# See docs/contributing/design/services/layout.md for the full per-role meta
# layout.
NETWORK_IPV6_ENABLED: false
defaults_networks:
  internet:
    ip4: '{{ lookup(''env'', ''IP4'') | default(''127.0.0.1'', true) }}'
    ip6: '{{ lookup(''env'', ''IP6'') | default(''::1'', true) }}'
    dns: '{{ lookup(''env'', ''DNS_IP'') | default('''') }}'
PORT_BANDS:
  local:
    http:
      start: 8001
      end: 8099
    websocket:
      start: 4001
      end: 4099
    oauth2:
      start: 16480
      end: 16499
    database:
      start: 3306
      end: 5432
    ldap:
      start: 389
      end: 389
  public:
    ssh:
      start: 2201
      end: 2299
    stun_turn:
      start: 3478
      end: 3499
    stun_turn_tls:
      start: 5349
      end: 5399
    federation:
      start: 8448
      end: 8499
    ldaps:
      start: 636
      end: 636
    relay:
      start: 20000
      end: 59999
