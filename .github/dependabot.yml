version: 2

updates:
  # ------------------------------------------------------------
  # Python dependencies (pyproject.toml / pip)
  # ------------------------------------------------------------
  - package-ecosystem: "pip"
    directories:
      - "**"
    schedule:
      interval: "daily"
      time: "00:00"
    rebase-strategy: "auto"
    labels:
      - "dependencies"
      - "python"

  # ------------------------------------------------------------
  # GitHub Actions workflows
  # ------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directories:
      - "**"
    schedule:
      interval: "daily"
      time: "00:00"
    labels:
      - "dependencies"
      - "ci"

  # ------------------------------------------------------------
  # Docker (Dockerfile)
  # ------------------------------------------------------------
  - package-ecosystem: "docker"
    directories:
      - "**"
    schedule:
      interval: "daily"
      time: "00:00"
    labels:
      - "dependencies"
      - "docker"

  # ------------------------------------------------------------
  # Docker Compose (compose.yml)
  # ------------------------------------------------------------
  - package-ecosystem: "docker-compose"
    directories:
      - "**"
    schedule:
      interval: "daily"
      time: "00:00"
    labels:
      - "dependencies"
      - "docker"

  # ------------------------------------------------------------
  # Additional recursive scans
  # ------------------------------------------------------------

  # ------------------------------------------------------------
  # Pre-commit hooks (.pre-commit-config.yaml)
  # ------------------------------------------------------------
  - package-ecosystem: "pre-commit"
    directories:
      - "**"
    schedule:
      interval: "daily"
      time: "00:00"
    labels:
      - "dependencies"
      - "ci"

