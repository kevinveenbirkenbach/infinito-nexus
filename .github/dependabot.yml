version: 2

updates:
  # ------------------------------------------------------------
  # Python dependencies (pyproject.toml / pip)
  # ------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
      time: "00:00"
    rebase-strategy: "auto"
    labels:
      - "dependencies"
      - "python"

  # ------------------------------------------------------------
  # Python dependencies (uv)
