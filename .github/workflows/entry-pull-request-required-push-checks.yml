name: CI (Push)

on:
  pull_request:

permissions:
  contents: read

jobs:
  pick-distro:
    name: 🎲 Pick distro(s)
    runs-on: ubuntu-latest
    steps:
      - name: Mark push-only check as satisfied for pull requests
        shell: bash
        run: |
          set -euo pipefail
          echo "PR compatibility check for push-only workflow."

  release-guard:
    name: "🛡️ Guard release"
    needs:
      - pick-distro
    runs-on: ubuntu-latest
    steps:
      - name: Mark push-only check as satisfied for pull requests
        shell: bash
        run: |
          set -euo pipefail
          echo "PR compatibility check for push-only workflow."
