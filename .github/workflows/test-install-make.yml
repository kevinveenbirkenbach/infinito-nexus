name: "📥 Test: Install Make"

on:
  workflow_call:

permissions:
  actions: write
  contents: read
  packages: read

jobs:
  test-install-make:
    name: 🛠️ Makefile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NIX_CONFIG: |
        access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        distro: [arch, debian, ubuntu, fedora, centos]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve INFINITO_SRC_DIR from env/default.env (SPOT)
        run: |
          src_dir="$(awk -F= '/^INFINITO_SRC_DIR=/{print $2; exit}' env/default.env)"
          test -n "${src_dir}" || { echo "INFINITO_SRC_DIR not found in env/default.env" >&2; exit 1; }
          echo "INFINITO_SRC_DIR=${src_dir}" >> "$GITHUB_ENV"

      - name: Install & test in pkgmgr virgin container
        run: |
          docker run --rm \
            -e NIX_CONFIG="${NIX_CONFIG}" \
            -e INFINITO_SRC_DIR="${INFINITO_SRC_DIR}" \
            -v "$(pwd):${INFINITO_SRC_DIR}" \
            -w "${INFINITO_SRC_DIR}" \
            "ghcr.io/kevinveenbirkenbach/pkgmgr-${{ matrix.distro }}-virgin:stable" \
            bash -lc '
              set -euo pipefail
              make install
              make setup
              source /opt/venvs/infinito/bin/activate
              infinito --help
            '
