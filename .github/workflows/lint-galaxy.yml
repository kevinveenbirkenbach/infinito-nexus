name: "🔍 Lint: Galaxy schema"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint-galaxy:
    name: 🧹 Lint Galaxy (galaxy-importer)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install galaxy-importer + ansible-core
        run: |
          python -m pip install --upgrade pip
          pip install galaxy-importer ansible-core

      - name: Run galaxy-importer over roles/
        run: bash scripts/lint/galaxy.sh
