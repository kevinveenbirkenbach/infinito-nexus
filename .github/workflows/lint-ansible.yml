name: "🔍 Lint: Ansible"

on:
  workflow_call:

permissions:
  contents: read
  packages: read

jobs:
  lint-ansible:
    name: 🧹 Lint Ansible
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ansible-core + ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint

      - name: Show Docker version
        run: docker version

      - name: Run lint-ansible via make
        run: make lint-ansible
