name: 🧪 Test: Code (Lint)

on:
  workflow_call:

permissions:
  contents: read
  packages: read

jobs:
  test-code-lint:
    name: 🧪 Run lint tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NIX_CONFIG: |
        access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      INFINITO_IMAGE_TAG: ci-${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show Docker version
        run: docker version

      - name: Run custom lint tests via make
        shell: bash
        run: |
          set -euo pipefail
          make up
          make test-lint 2>&1 | tee /tmp/lint-output.txt

      - name: Build step summary from annotations
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          python3 -m utils.annotations.summarize /tmp/lint-output.txt "Lint Annotation Summary"
