# no-raw-docker: skip. Runs on a GitHub-hosted runner; the `container` wrapper is not installed there.
name: "🔍 Lint: Shell Scripts"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint-shell:
    name: 🧹 Lint shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck (container)
        run: |
          mapfile -d '' shell_files < <(find . -type f -name '*.sh' -print0)
          if [ "${#shell_files[@]}" -eq 0 ]; then
            echo "No shell scripts found."
            exit 0
          fi

          docker run --rm \
            -v "$PWD:/mnt" \
            -w /mnt \
            koalaman/shellcheck:latest \
            -x "${shell_files[@]}"
