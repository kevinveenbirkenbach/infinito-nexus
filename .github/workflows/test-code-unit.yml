name: "🧪 Test: Code (Units)"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test-code-unit:
    name: 🧪 Run unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INFINITO_TEST_RUNNER: host

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests via make
        shell: bash
        run: |
          set -euo pipefail
          make test-unit 2>&1 | tee /tmp/unit-output.txt

      - name: Build step summary from annotations
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          python3 -m utils.annotations.summarize /tmp/unit-output.txt "Unit Test Annotation Summary"
