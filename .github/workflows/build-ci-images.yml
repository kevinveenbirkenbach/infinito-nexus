name: Build CI images (all distros)

on:
  workflow_call:
    inputs:
      distros:
        description: "Space-separated distro list"
        required: true
        type: string
      checkout_ref:
        description: "Optional git ref to checkout before build (default: event ref)"
        required: false
        type: string
        default: ""
      image_tag:
        description: "Optional image tag override (default: ci-${github.sha})"
        required: false
        type: string
        default: ""
      concurrency_channel:
        description: "Optional channel to separate concurrency groups between callers"
        required: false
        type: string
        default: "default"
      image_wait_attempts:
        description: "Polling attempts for waiting on prebuilt images"
        required: false
        type: string
        default: "1440"
      image_wait_sleep_seconds:
        description: "Polling interval in seconds for waiting on prebuilt images"
        required: false
        type: string
        default: "10"
    secrets:
      GHCR_PAT:
        required: false
      GHCR_USERNAME:
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: infinito-build-${{ github.repository }}-${{ inputs.concurrency_channel }}-${{ inputs.checkout_ref || github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: 🏷️ Label images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.out.outputs.matrix }}
      image_tag: ${{ steps.out.outputs.image_tag }}
    steps:
      - name: Install jq
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Compute matrix JSON
        id: out
        run: |
          set -euo pipefail
          distros="${{ inputs.distros }}"
          json="$(printf '%s' "$distros" | jq -Rc 'split(" ") | map(select(length>0))')"
          image_tag="${{ inputs.image_tag }}"
          if [ -z "${image_tag}" ]; then
            image_tag="ci-${GITHUB_SHA}"
          fi
          echo "matrix=${json}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "Using matrix: ${json}"
          echo "Using image tag: ${image_tag}"

  build:
    name: 🏗️ Build image (${{ matrix.distro }})
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        distro: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout trusted workflow repo (helpers)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Checkout source to build
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.checkout_ref || github.ref }}
          path: _src
          persist-credentials: false

      - name: Disk pressure (start)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Disk pressure: START ==="
          echo "Runner: $(uname -a)"
          echo
          df -h
          echo
          docker version || true
          echo
          docker system df || true
          echo
          docker buildx version || true
          echo
          docker buildx du || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_PAT != '' && secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PAT != '' && secrets.GHCR_USERNAME != '' && secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Disk pressure (pre-build)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Disk pressure: PRE-BUILD ==="
          df -h
          echo
          docker system df || true
          echo
          docker buildx du || true

      - name: Resolve repository owner
        id: owner
        shell: bash
        run: |
          set -euo pipefail
          echo "owner=$(scripts/meta/resolve/repository/owner.sh)" >> "$GITHUB_OUTPUT"

      - name: Build & push (retry 7x, 20s)
        if: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) }}
        shell: bash
        env:
          GITHUB_REPOSITORY_OWNER: ${{ steps.owner.outputs.owner }}
          BUILD_CONTEXT_DIR: _src
          MATRIX_DISTRO: ${{ matrix.distro }}
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          USE_NIX_TOKEN: ${{ !(github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository) }}
          NIX_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_ATTEMPTS: "7"
          RETRY_DELAY_SECONDS: "20"
        run: ./scripts/image/push.sh

      - name: Wait for prebuilt image (fork PR)
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        env:
          GITHUB_REPOSITORY_OWNER: ${{ steps.owner.outputs.owner }}
          MATRIX_DISTRO: ${{ matrix.distro }}
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IMAGE_WAIT_ATTEMPTS: ${{ inputs.image_wait_attempts }}
          IMAGE_WAIT_SLEEP_SECONDS: ${{ inputs.image_wait_sleep_seconds }}
        run: ./scripts/meta/wait/image.sh

      - name: Disk pressure (post-build)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Disk pressure: POST-BUILD ==="
          df -h
          echo
          docker system df || true
          echo
          docker buildx du || true

      - name: Cleanup (always)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Cleanup ==="
          docker buildx prune -af || true
          docker builder prune -af || true
          docker image prune -af || true
          docker container prune -f || true
          echo
          echo "=== Disk pressure: AFTER CLEANUP ==="
          df -h
          echo
          docker system df || true
          docker buildx du || true
