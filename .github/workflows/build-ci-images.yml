name: Build CI images (all distros)

on:
  workflow_call:
    inputs:
      distros:
        description: "Space-separated distro list"
        required: true
        type: string
    secrets:
      GHCR_PAT:
        required: false
      GHCR_USERNAME:
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: infinito-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: 🏷️ Label images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.out.outputs.matrix }}
      image_tag: ci-${{ github.sha }}
    steps:
      - name: Install jq
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Compute matrix JSON
        id: out
        run: |
          set -euo pipefail
          distros="${{ inputs.distros }}"
          json="$(printf '%s' "$distros" | jq -Rc 'split(" ") | map(select(length>0))')"
          echo "matrix=${json}" >> "$GITHUB_OUTPUT"
          echo "Using matrix: ${json}"

  build:
    name: 🏗️ Build image (${{ matrix.distro }})
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        distro: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Disk pressure (start)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Disk pressure: START ==="
          echo "Runner: $(uname -a)"
          echo
          df -h
          echo
          docker version || true
          echo
          docker system df || true
          echo
          docker buildx version || true
          echo
          docker buildx du || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_PAT != '' && secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PAT != '' && secrets.GHCR_USERNAME != '' && secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Disk pressure (pre-build)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Disk pressure: PRE-BUILD ==="
          df -h
          echo
          docker system df || true
          echo
          docker buildx du || true

      - name: Build & push (retry 7x, 20s)
        shell: bash
        run: |
          set -euo pipefail

          max_attempts=7
          retry_delay_seconds=20
          attempt=1

          while true; do
            echo "=== Build & push attempt ${attempt}/${max_attempts} ==="

            if docker buildx build \
              --file ./Dockerfile \
              --push \
              --tag "ghcr.io/${{ github.repository_owner }}/infinito-${{ matrix.distro }}:${{ needs.prepare.outputs.image_tag }}" \
              --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
              --build-arg "PKGMGR_IMAGE=ghcr.io/kevinveenbirkenbach/pkgmgr-${{ matrix.distro }}:stable" \
              --build-arg "NIX_CONFIG=access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}" \
              --cache-from "type=gha,scope=infinito-${{ matrix.distro }}" \
              --cache-to "type=gha,mode=max,scope=infinito-${{ matrix.distro }}" \
              .; then
              echo "Build & push succeeded on attempt ${attempt}/${max_attempts}."
              break
            fi

            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "Build & push failed after ${max_attempts} attempts."
              exit 1
            fi

            echo "Attempt ${attempt} failed. Retrying in ${retry_delay_seconds}s..."
            sleep "${retry_delay_seconds}"
            attempt=$((attempt + 1))
          done

      - name: Disk pressure (post-build)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Disk pressure: POST-BUILD ==="
          df -h
          echo
          docker system df || true
          echo
          docker buildx du || true

      - name: Cleanup (always)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Cleanup ==="
          docker buildx prune -af || true
          docker builder prune -af || true
          docker image prune -af || true
          docker container prune -f || true
          echo
          echo "=== Disk pressure: AFTER CLEANUP ==="
          df -h
          echo
          docker system df || true
          docker buildx du || true
