name: Test Docker Image Versions

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test-docker-image-versions:
    name: 🐳 Check Docker image versions
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML

      - name: Check Docker image versions
        run: |
          python -m unittest discover \
            -s tests/integration \
            -t . \
            -p "test_docker_image_versions.py" \
            -v
