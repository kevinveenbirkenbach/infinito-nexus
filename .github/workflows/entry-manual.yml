name: "⚡ CI: Manual"
run-name: "Manual CI triggered: ${{ inputs.distros }}; ${{ inputs.whitelist != '' && inputs.whitelist || 'diff-derived (origin/main)' }}"

concurrency:
  group: global-ci-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      distros:
        description: "Space-separated distro list (overrides default). Example: 'arch debian'"
        required: false
        default: "debian"
        type: string
      whitelist:
        description: "Empty: diff vs origin/main. '__ALL__': force full deploy. Else: explicit space-separated app ids."
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write
  security-events: write
  actions: write

jobs:
  ci-orchestrator:
    name: 🎛️ Orchestrate CI (manual)
    uses: ./.github/workflows/ci-orchestrator.yml
    with:
      distros: ${{ inputs.distros }}
      whitelist: ${{ inputs.whitelist }}
    secrets: inherit
