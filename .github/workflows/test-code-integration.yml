name: Test Infinito.Nexus Code

on:
  workflow_call:

permissions:
  contents: read
  packages: read

jobs:
  test-code-integration:
    name: 🧪 Run integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NIX_CONFIG: |
        access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      INFINITO_IMAGE_TAG: ci-${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show Docker version
        run: docker version

      - name: Run integration tests via make
        shell: bash
        run: |
          set -euo pipefail
          make up
          make test-integration 2>&1 | tee /tmp/integration-output.txt

      - name: Build step summary from annotations
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          python3 -m utils.annotations.summarize /tmp/integration-output.txt "Integration Test Annotation Summary"
