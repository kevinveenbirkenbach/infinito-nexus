name: CI (On Pull-Request)

concurrency:
  group: global-ci-${{ github.repository }}-${{ github.ref_name }}
  # Keep only the newest run for the same PR ref (e.g. after synchronize pushes)
  # to avoid stale waiting approvals and unnecessary CI load.
  cancel-in-progress: true

on:
  pull_request:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  ci-orchestrator:
    uses: ./.github/workflows/ci-orchestrator.yml
