name: Update Agent Skills

on:
  schedule:
    # Daily at 00:00 UTC (same as Dependabot)
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-skills:
    name: 🧠 Update skills-lock.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Update skills
        run: bash scripts/install/skills/update.sh

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet skills-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR if skills-lock.json changed
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="chore/update-skills-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add skills-lock.json
          git commit -m "chore(skills): update skills-lock.json to latest versions"
          git push origin "${branch}"
          gh pr create \
            --title "chore(skills): update agent skills to latest versions" \
            --body "Automated weekly update of \`skills-lock.json\` via \`npx skills update\`." \
            --base master \
            --head "${branch}"
