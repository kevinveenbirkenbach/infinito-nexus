name: "🔍 Lint: JavaScript"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint-javascript:
    name: 🧹 Lint JavaScript
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install ESLint dependencies
        run: npm ci --no-fund --no-audit

      - name: Run lint-javascript via make
        run: make lint-javascript
