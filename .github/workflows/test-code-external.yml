name: "🧪 Test: Code (External)"

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-code-external:
    name: 🧪 Run external tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INFINITO_TEST_RUNNER: host

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run external tests via make
        shell: bash
        run: |
          set -euo pipefail
          make test-external 2>&1 | tee /tmp/external-output.txt

      - name: Build step summary from annotations
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          python3 -m utils.annotations.summarize /tmp/external-output.txt "External Test Annotation Summary"
