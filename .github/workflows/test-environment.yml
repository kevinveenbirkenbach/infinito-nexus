name: "💻 Test: Development Environment"

on:
  workflow_dispatch:
  workflow_call:

permissions:
  actions: write
  contents: read
  packages: read

jobs:
  test-environment:
    name: 🧑‍💻 Test Environment (${{ matrix.dev_runtime_image }})
    runs-on: ubuntu-latest
    timeout-minutes: 270

    strategy:
      fail-fast: false
      matrix:
        dev_runtime_image:
          - manjarolinux/base
          - debian:bookworm
          - ubuntu:latest
          - fedora:latest
          - quay.io/centos/centos:latest

    env:
      DEV_RUNTIME_IMAGE: ${{ matrix.dev_runtime_image }}
      NIX_CONFIG: |
        access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      # Cache caps for CI. The orchestrator unsets GITHUB_ACTIONS to
      # simulate local dev, which activates the `cache` compose profile
      # (registry-cache + package-cache). Bind paths moved to /mnt so
      # caches share the 74g ephemeral disk with /var/lib/docker
      # instead of stressing the small / partition. Sizes tuned for
      # post-prune in-run re-pulls: large enough to fit one deploy's
      # in-use image set (rpardini) plus pip/npm/apt artefacts (Nexus),
      # leaving ~62g headroom for Docker layer storage on /mnt.
      INFINITO_REGISTRY_CACHE_MAX_SIZE: 8g
      INFINITO_REGISTRY_CACHE_HOST_PATH: /mnt/cache/registry/mirror
      INFINITO_REGISTRY_CACHE_CA_HOST_PATH: /mnt/cache/registry/ca
      INFINITO_PACKAGE_CACHE_BLOBSTORE_MAX: 4g
      INFINITO_PACKAGE_CACHE_HEAP: 1g
      INFINITO_PACKAGE_CACHE_DIRECT_MEM: 1g
      INFINITO_PACKAGE_CACHE_HOST_PATH: /mnt/cache/package/data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run dev environment routine
        shell: bash
        run: |
          set -euo pipefail
          HOST_WORKDIR="$(pwd -P)"

          # Build the development image in this job and avoid pulling mutable GHCR tags.
          # Keep the same absolute path inside the container as on the host.
          # This is required because docker compose talks to the host daemon via /var/run/docker.sock.
          docker run --rm \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            -e GITHUB_REPOSITORY_OWNER="${{ github.repository_owner }}" \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e INFINITO_DISTRO=debian \
            -e INFINITO_IMAGE=infinito-debian \
            -e INFINITO_PULL_POLICY=never \
            -e INFINITO_NO_BUILD=0 \
            -e NIX_CONFIG \
            -e INFINITO_REGISTRY_CACHE_MAX_SIZE \
            -e INFINITO_REGISTRY_CACHE_HOST_PATH \
            -e INFINITO_REGISTRY_CACHE_CA_HOST_PATH \
            -e INFINITO_PACKAGE_CACHE_BLOBSTORE_MAX \
            -e INFINITO_PACKAGE_CACHE_HEAP \
            -e INFINITO_PACKAGE_CACHE_DIRECT_MEM \
            -e INFINITO_PACKAGE_CACHE_HOST_PATH \
            --network host \
            -v "${HOST_WORKDIR}:${HOST_WORKDIR}" \
            -v "/mnt/docker:/var/lib/docker" \
            -v "/var/run/docker.sock:/var/run/docker.sock" \
            -w "${HOST_WORKDIR}" \
            "${DEV_RUNTIME_IMAGE}" \
            bash -lc '
              bash ./scripts/tests/environment/00_orchestrator.sh
            '
