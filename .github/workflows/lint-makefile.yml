name: "🔍 Lint: Makefile"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint-makefile:
    name: 🧹 Lint Makefile
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      INFINITO_LINT_RUNNER: host

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install mbake
        run: |
          python -m pip install --upgrade pip
          pip install mbake

      - name: Run mbake format --check via make
        run: make lint-makefile
