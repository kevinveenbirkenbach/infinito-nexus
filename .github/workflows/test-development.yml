name: Test Development Environment

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: read

jobs:
  test-environment:
    name: 🧑‍💻 Environment (${{ matrix.dev_runtime_image }})
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        dev_runtime_image:
          - manjarolinux/base
          - debian:bookworm
          - ubuntu:latest
          - fedora:latest
          - quay.io/centos/centos:latest

    env:
      DEV_RUNTIME_IMAGE: ${{ matrix.dev_runtime_image }}
      NIX_CONFIG: |
        access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run dev environment routine
        shell: bash
        run: |
          set -euo pipefail

          # Build the development image in this job and avoid pulling mutable GHCR tags.
          docker run --rm \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_REPOSITORY_OWNER="${{ github.repository_owner }}" \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e INFINITO_DISTRO=debian \
            -e INFINITO_IMAGE=infinito-debian \
            -e INFINITO_PULL_POLICY=never \
            -e INFINITO_NO_BUILD=0 \
            -e NIX_CONFIG \
            -v "$PWD:/workspace" \
            -v "/mnt/docker:/var/lib/docker" \
            -v "/var/run/docker.sock:/var/run/docker.sock" \
            -w /workspace \
            "${DEV_RUNTIME_IMAGE}" \
            bash -lc '
              bash /workspace/scripts/tests/development.sh
            '
