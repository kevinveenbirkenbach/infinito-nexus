name: Test Dev Environment

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: read

jobs:
  test-environment:
    name: 🧪 Dev env + dashboard (${{ matrix.dev_runtime_image }})
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        dev_runtime_image:
          - manjarolinux/base
          - debian:bookworm
          - ubuntu:latest
          - fedora:latest

    env:
      DEV_RUNTIME_IMAGE: ${{ matrix.dev_runtime_image }}
      NIX_CONFIG: |
        access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run dev environment routine
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm \
            -e NIX_CONFIG \
            -v "$PWD:/workspace" \
            -v "/mnt/docker:/var/lib/docker" \
            -w /workspace \
            "${DEV_RUNTIME_IMAGE}" \
            bash -lc '
              bash /workspace/scripts/tests/development.sh
            '
