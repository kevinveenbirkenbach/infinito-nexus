proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Accept-Encoding   "";
proxy_buffering on;
proxy_request_buffering off;
proxy_read_timeout 300s;
proxy_connect_timeout 30s;

# Docker embedded DNS, pinned to bypass image-specific resolv.conf order.
resolver 127.0.0.11 ipv6=off valid=30s;

server {
	listen 80;
	server_name deb.debian.org;
	location /debian/ {
		rewrite ^/debian/(.*)$ /repository/apt-debian/$1 break;
		proxy_pass http://package-cache:8081;
	}
	location /debian-security/ {
		rewrite ^/debian-security/(.*)$ /repository/apt-debian-security/$1 break;
		proxy_pass http://package-cache:8081;
	}
}

server {
	listen 80;
	server_name archive.ubuntu.com;
	location /ubuntu/ {
		rewrite ^/ubuntu/(.*)$ /repository/apt-ubuntu/$1 break;
		proxy_pass http://package-cache:8081;
	}
}
server {
	listen 80;
	server_name security.ubuntu.com;
	location /ubuntu/ {
		rewrite ^/ubuntu/(.*)$ /repository/apt-ubuntu-security/$1 break;
		proxy_pass http://package-cache:8081;
	}
}

server {
	listen 80;
	server_name dl-cdn.alpinelinux.org;
	location /alpine/ {
		rewrite ^/alpine/(.*)$ /repository/raw-alpine/$1 break;
		proxy_pass http://package-cache:8081;
	}
}

server {
	listen 443 ssl;
	server_name pypi.org;
	ssl_certificate     /etc/nginx/certs/pypi.org.crt;
	ssl_certificate_key /etc/nginx/certs/pypi.org.key;
	location / {
		proxy_pass http://package-cache:8081/repository/pypi-proxy/;
	}
}

