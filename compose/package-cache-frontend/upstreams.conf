# package-cache-frontend nginx config
#
# Terminates TLS for upstream package-manager hostnames using certs
# signed by the frontend CA (see scripts/docker/cache/package-frontend-certs.sh)
# and reverse-proxies onto the Sonatype Nexus 3 OSS pull-through cache
# (`package-cache` service). This makes Nexus's per-format proxy paths
# (`/repository/<name>/...`) reachable transparently under the
# upstreams' real hostnames, without rewriting any client URL.
#
# Hostname list is the single source of truth duplicated in
#   * scripts/docker/cache/package-frontend-certs.sh — leaf-cert HOSTNAMES
#   * cli/deploy/development/compose.py — runner extra_hosts
# Keep all three in sync when adding/removing an upstream.

# Common proxy headers + buffer settings shared by every server-block.
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Accept-Encoding   "";
proxy_buffering on;
proxy_request_buffering off;
proxy_read_timeout 300s;
proxy_connect_timeout 30s;

# Resolver for the package-cache hostname inside the compose default
# network. Docker's embedded DNS lives at 127.0.0.11; pinning it here
# avoids depending on the container image's /etc/resolv.conf order.
resolver 127.0.0.11 ipv6=off valid=30s;

# pypi.org — pip's index endpoint.
server {
	listen 443 ssl;
	server_name pypi.org;
	ssl_certificate     /etc/nginx/certs/pypi.org.crt;
	ssl_certificate_key /etc/nginx/certs/pypi.org.key;
	location / {
		proxy_pass http://package-cache:8081/repository/pypi-proxy/;
	}
}

# files.pythonhosted.org — pip's tarball/wheel host. pypi-proxy in
# Nexus serves both index and dists under the same repo path.
server {
	listen 443 ssl;
	server_name files.pythonhosted.org;
	ssl_certificate     /etc/nginx/certs/files.pythonhosted.org.crt;
	ssl_certificate_key /etc/nginx/certs/files.pythonhosted.org.key;
	location / {
		proxy_pass http://package-cache:8081/repository/pypi-proxy/;
	}
}

