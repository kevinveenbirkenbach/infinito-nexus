# nocheck: dynamic-flag
logout:
  enabled: false
  shared: false
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
# nocheck: dynamic-flag
oidc:
  enabled: false
  shared: false
ldap:
  enabled: true  # nocheck: dynamic-flag
  shared: "{{ 'svc-db-openldap' in group_names }}"
xmpp:
  image: ejabberd/ecs
  version: latest
  name: ejabberd
  ports:
    local:
      http: 8082
  run_after:
  - svc-db-openldap
  lifecycle: beta
