oidc:
  enabled: true
  shared: true
logout:
  enabled: true
  shared: true
dashboard:
  enabled: true
  shared: true
matomo:
  enabled: true
  shared: true
email:
  enabled: true
  shared: true
mariadb:
  enabled: true
  shared: true
moodle:
  # nocheck: docker-version
  version: '4.5'  # Latest LTS - Necessary for OIDC
  image: bitnamilegacy/moodle
  name: moodle
  min_storage: 10GB
  cpus: 1.0
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 512
  site_titel: Academy on {{ DOMAIN_PRIMARY }}
  ports:
    local:
      http: 8026
  run_after:
  - web-app-keycloak
  lifecycle: beta
css:
  enabled: false
  shared: true
prometheus:
  enabled: true
  shared: true
