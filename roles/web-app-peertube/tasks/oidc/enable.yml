---
- name: "Load OIDC Settings for Peertube"
  include_vars: vars/oidc-settings.yml
  changed_when: false

- name: Check if OIDC plugin is already installed
  command: >
    container exec {{ PEERTUBE_CONTAINER }} test -d /data/plugins/data/peertube-plugin-auth-openid-connect
  register: peertube_oidc_plugin_check
  failed_when: false
  changed_when: false

- name: "Install auth-openid-connect plugin for Peertube (with temp mem_limit bump + diagnostics on failure)"
  when: peertube_oidc_plugin_check.rc != 0
  block:

    # Raise the container cgroup ceiling for the duration of the install.
    # The install node process and the long-running main peertube node
    # process share this cgroup (install runs via `container exec`), and
    # their combined RSS plus native allocations (node-gyp, npm postinstall)
    # was tripping the runtime mem_limit and SIGKILLing peertube, surfacing
    # as "Container is restarting" on subsequent exec attempts.
    # --memory-swap -1 allows unlimited swap for the install window (host
    # has a 16G swapfile from issue #162).
    - name: "PEERTUBE | Raise mem_limit for plugin install"
      ansible.builtin.command: >-
        container update
        --memory {{ PEERTUBE_OIDC_PLUGIN_INSTALL_MEM_LIMIT }}
        --memory-swap -1
        {{ PEERTUBE_CONTAINER }}
      changed_when: true

    - name: "Install auth-openid-connect plugin for Peertube"
      # V8 heap is still capped tight — the cgroup bump above covers native
      # memory and spawned workers, while --max-old-space-size keeps the
      # install's V8 old-generation predictable.
      ansible.builtin.command: >
        container exec
        -e NODE_OPTIONS=--max-old-space-size={{ PEERTUBE_OIDC_PLUGIN_INSTALL_MAX_OLD_SPACE_MB }}
        {{ PEERTUBE_CONTAINER }} npm run plugin:install -- --npm-name {{ PEERTUBE_OIDC_PLUGIN }}
      register: peertube_oidc_install
      changed_when: peertube_oidc_install.rc == 0
      retries: 3
      delay: 15
      until: peertube_oidc_install.rc == 0
      notify: compose up

    # Restore the compose-defined mem_limit on the happy path only.
    # --memory-swap is pinned to the same value (no extra swap for the
    # container) — matches the bump contract (extra swap granted solely
    # during the install window). On failure the rescue block leaves the
    # bumped limits in place so diagnostics reflect real install-time
    # state; the next `compose up` recreates the container and reinstates
    # docker's default memory-swap behavior from compose.yml.
    - name: "PEERTUBE | Restore compose-defined mem_limit"
      ansible.builtin.command: >-
        container update
        --memory {{ PEERTUBE_MEM_LIMIT }}
        --memory-swap {{ PEERTUBE_MEM_LIMIT }}
        {{ PEERTUBE_CONTAINER }}
      changed_when: true

  rescue:

    - name: "PEERTUBE | Dump diagnostics after install failure"
      ansible.builtin.script: "{{ role_path }}/files/diagnostics.sh {{ PEERTUBE_CONTAINER }}"
      environment:
        PEERTUBE_OIDC_PLUGIN_INSTALL_MAX_OLD_SPACE_MB: "{{ PEERTUBE_OIDC_PLUGIN_INSTALL_MAX_OLD_SPACE_MB }}"
        PEERTUBE_MAX_OLD_SPACE_SIZE: "{{ PEERTUBE_MAX_OLD_SPACE_SIZE }}"
      changed_when: false
      failed_when: false

    - name: "PEERTUBE | Fail explicitly after diagnostics"
      ansible.builtin.fail:
        msg: >-
          Installing peertube-plugin-auth-openid-connect failed.
          See PEERTUBE DIAGNOSTICS block above for state, OOMKilled, exit
          code, logs, stats, host memory, and dmesg OOM-killer evidence.

- name: "Update the settings column of the auth-openid-connect plugin"
  community.postgresql.postgresql_query:
    db: "{{ lookup('database', application_id, 'name') }}"
    login_user: "{{ lookup('database', application_id, 'username') }}"
    login_password: "{{ lookup('database', application_id, 'password') }}"
    login_host: "{{ lookup('database', application_id, 'reach_host') }}"
    login_port: "{{ lookup('database', application_id, 'port') }}"
    query: "{{ lookup('template', 'upsert-oidc-plugin.sql.j2') }}"
  register: _peertube_oidc_update
  retries: 5
  delay: 3
  until: _peertube_oidc_update is succeeded
  notify: compose up

- name: "Ensure plugin is enabled in PeerTube (CLI)"
  command: >
    container exec {{ PEERTUBE_CONTAINER }} npm run plugin:enable -- --npm-name {{ PEERTUBE_OIDC_PLUGIN }}
  register: _peertube_enable
  failed_when: false
  changed_when: >
    _peertube_enable.stdout is defined and
    ('already enabled' not in _peertube_enable.stdout)
