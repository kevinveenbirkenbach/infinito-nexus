---
- name: "Load OIDC Settings for Peertube"
  include_vars: vars/oidc-settings.yml
  changed_when: false

- name: Check if OIDC plugin is already installed
  command: >
    container exec {{ PEERTUBE_CONTAINER }} test -d /data/plugins/data/peertube-plugin-auth-openid-connect
  register: peertube_oidc_plugin_check
  failed_when: false
  changed_when: false

- name: "Install auth-openid-connect plugin for Peertube"
  # The plugin install spawns a fresh node process under the running PeerTube
  # container. Without an explicit heap cap, V8 inherits the container-wide
  # NODE_OPTIONS (~35% of mem_limit, multi-GB) and can push a constrained CI
  # runner over its host RAM, getting SIGKILLed (rc=137) before the install
  # completes. Force a tight heap and retry to absorb transient host pressure.
  command: >
    container exec
    -e NODE_OPTIONS=--max-old-space-size={{ PEERTUBE_OIDC_PLUGIN_INSTALL_MAX_OLD_SPACE_MB }}
    {{ PEERTUBE_CONTAINER }} npm run plugin:install -- --npm-name {{ PEERTUBE_OIDC_PLUGIN }}
  register: peertube_oidc_install
  changed_when: peertube_oidc_install.rc == 0
  retries: 3
  delay: 15
  until: peertube_oidc_install.rc == 0
  when: peertube_oidc_plugin_check.rc != 0
  notify: compose up

- name: "Update the settings column of the auth-openid-connect plugin"
  community.postgresql.postgresql_query:
    db: "{{ lookup('database', application_id, 'name') }}"
    login_user: "{{ lookup('database', application_id, 'username') }}"
    login_password: "{{ lookup('database', application_id, 'password') }}"
    login_host: "{{ lookup('database', application_id, 'reach_host') }}"
    login_port: "{{ lookup('database', application_id, 'port') }}"
    query: |
      UPDATE public.plugin
      SET settings    = '{{ oidc_settings | to_json }}'::jsonb,
          enabled     = TRUE,
          uninstalled = FALSE
      WHERE name = 'auth-openid-connect'
        AND (
          settings IS DISTINCT FROM '{{ oidc_settings | to_json }}'::jsonb
          OR enabled IS DISTINCT FROM TRUE
          OR uninstalled IS DISTINCT FROM FALSE
        );
  register: _peertube_oidc_update
  retries: 5
  delay: 3
  until: _peertube_oidc_update is succeeded
  notify: compose up

- name: "Ensure plugin is enabled in PeerTube (CLI)"
  command: >
    container exec {{ PEERTUBE_CONTAINER }} npm run plugin:enable -- --npm-name {{ PEERTUBE_OIDC_PLUGIN }}
  register: _peertube_enable
  failed_when: false
  changed_when: >
    _peertube_enable.stdout is defined and
    ('already enabled' not in _peertube_enable.stdout)
