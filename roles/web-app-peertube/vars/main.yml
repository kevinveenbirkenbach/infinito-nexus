# General
application_id:                   "web-app-peertube"
entity_name:                      "{{ application_id | get_entity_name }}"

# Role variables
PEERTUBE_VERSION:                 "{{ lookup('config', application_id, 'compose.services.peertube.version') }}"
PEERTUBE_IMAGE:                   "{{ lookup('config', application_id, 'compose.services.peertube.image') }}"
PEERTUBE_CONTAINER:               "{{ lookup('config', application_id, 'compose.services.peertube.name') }}"
PEERTUBE_DATA_VOLUME:             "{{ lookup('config', application_id, 'compose.volumes.data') }}"
PEERTUBE_CONFIG_VOLUME:           "{{ lookup('config', application_id, 'compose.volumes.config') }}"

# OIDC
PEERTUBE_OIDC_PLUGIN:             "peertube-plugin-auth-openid-connect"
PEERTUBE_OIDC_ENABLED:            "{{ lookup('config', application_id, 'compose.services.oidc.enabled') }}"

# Performance
PEERTUBE_CPUS:                    "{{ lookup('config', application_id, 'compose.services.peertube.cpus') | float }}"
PEERTUBE_MAX_OLD_SPACE_SIZE:      "{{ applications | node_max_old_space_size(application_id, entity_name) }}"
_peertube_concurrency_candidate:  "{{ ((PEERTUBE_CPUS | float) * 0.5) | round(0, 'floor') | int }}"
PEERTUBE_TRANSCODING_CONCURRENCY: "{{ [ ( [ (_peertube_concurrency_candidate | int), 1 ] | max ), 8 ] | min }}"

# Heap cap for the one-off `npm run plugin:install` exec. Kept tight so the
# plugin install does not blow past the host RAM budget on constrained CI
# runners (where the container-wide NODE_OPTIONS would otherwise grant several
# GB of V8 heap and trip the host OOM killer).
PEERTUBE_OIDC_PLUGIN_INSTALL_MAX_OLD_SPACE_MB: 1024
