server:
  domains:
    canonical:
      - oauth2-proxy.{{ DOMAIN_PRIMARY }}
    aliases: []
compose:
  services:
    logout:
      enabled: true
      shared: true
    dashboard:
      enabled: false
    matomo:
      enabled: true
      shared: true
    css:
      enabled: true
      shared: true
    oauth2-proxy:
      image:    "quay.io/oauth2-proxy/oauth2-proxy"
      version:  "latest"
      min_storage: "1GB"
      # Internal listen port inside the oauth2-proxy container.
      # Single SPOT consumed by container.yml.j2 (right side of the port
      # mapping) AND oauth2-proxy-keycloak.cfg.j2 (`http_address`); both
      # MUST stay in sync, so they read this value via lookup('config').
      port:     4180
      # Filename of the rendered oauth2-proxy config inside the role's
      # docker volume directory. Consumed by tasks/main.yml (template
      # destination) and container.yml.j2 (volume mount source).
      configuration_file: "oauth2-proxy-keycloak.cfg"
    # noqa: email
    email:
      enabled: false
      shared: false
    prometheus:
      enabled: true
      shared: true
