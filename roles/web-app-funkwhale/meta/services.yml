funkwhale:
  image: funkwhale/front
  version: 2.0.2
  min_storage: 20GB
  ports:
    local:
      http: 8012
  run_after:
    - web-app-matomo
    - web-app-keycloak
    - web-app-mailu
  lifecycle: beta
  cpus: '1.0'
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 1024
api:
  image: funkwhale/api
  version: 2.0.2
  min_storage: 5GB
  cpus: '0.5'
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
typesense:
  image: typesense/typesense
  version: '30.2'
  min_storage: 1GB
  cpus: '0.2'
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
logout:
  enabled: true
  shared: true
ldap:
  enabled: true
  shared: true
dashboard:
  enabled: true
  shared: true
matomo:
  enabled: true
  shared: true
email:
  enabled: true
  shared: true
# noqa: shared
redis:
  backup:
    disabled: true
  enabled: true
postgres:
  enabled: true
  shared: true
oauth2:
  origin:
    host: front
    port: '80'
  acl:
    blacklist:
      - /login
  enabled: false
css:
  enabled: false
  shared: true
prometheus:
  enabled: true
  shared: true
