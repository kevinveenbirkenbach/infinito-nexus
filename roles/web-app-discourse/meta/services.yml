asset:
  enabled: "{{ 'web-svc-asset' in group_names }}"
  shared: "{{ 'web-svc-asset' in group_names }}"
oidc:
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
ldap:
  enabled: "{{ 'svc-db-openldap' in group_names }}"
  shared: "{{ 'svc-db-openldap' in group_names }}"
logout:
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
postgres:
  enabled: true  # nocheck: dynamic-flag
  shared: "{{ 'svc-db-postgres' in group_names }}"
# nocheck: shared
# nocheck: dynamic-flag
redis:
  backup:
    disabled: true
  enabled: true
discourse:
  # `shared: true` is required so the service registry recognises this
  # role as the provider of the `discourse` service. Other roles
  # declare `services.discourse.enabled: ...` (e.g.
  # web-app-wordpress' wp-discourse plugin gate); without this flag
  # the variant-aware deploy planner cannot resolve those declarations
  # to web-app-discourse, and the consumer ends up trying to
  # `docker exec discourse` against a container that was never pulled.
  shared: true
  enabled: true
  name: discourse
  version: main
  min_storage: 15GB
  repository: https://github.com/discourse/discourse_docker.git
  plugins:
    docker_manager:
      enabled: true
    discourse-activity-pub:
      enabled: true
    discourse-akismet:
      enabled: true
  ports:
    local:
      http: 8020
  lifecycle: beta
# nocheck: dynamic-flag
css:
  enabled: true
  shared: true
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
