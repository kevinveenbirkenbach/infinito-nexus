# Matrix-deploy variant overrides for web-app-discourse.
# See docs/contributing/artefact/files/role/variants.md for the file format.
#
# `postgres` is pinned in `services.yml` (`shared: true`) because
# Discourse's `EnablePgVectorExtension` migration requires the `vector`
# extension which only the central `svc-db-postgres` image carries
# (bundled launcher postgres is vanilla). Variants below don't override.

# variant 0: every dynamic flag on (exercises the in-group_names branch).
- services:
    asset:
      enabled: true
      shared: true
    dashboard:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    oidc:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true

# variant 1: every dynamic flag off; postgres stays shared by design
# (pinned in services.yml — see comment above).
    css:
      enabled: true
      shared: true
- services:
    asset:
      enabled: false
      shared: false
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    oidc:
      enabled: false
      shared: false
    prometheus:
      enabled: false
      shared: false
    css:
      enabled: false
      shared: false
