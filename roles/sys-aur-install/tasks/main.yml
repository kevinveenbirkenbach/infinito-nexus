# nocheck: run-once

- name: Include dependency 'sys-aur'
  include_role:
    name: sys-aur
  when: run_once_sys_aur is not defined

- name: Validate sys-aur-install parameters
  assert:
    that:
      - (not (yay_install_upgrade | bool)) or (yay_install_packages | length == 0)
    fail_msg: >-
      sys-aur-install: 'yay_install_packages' cannot be used together with
      'yay_install_upgrade=true' (kewlfft.aur.aur parameters 'name' and 'upgrade'
      are mutually exclusive).
  when: (yay_install_packages | length > 0) or (yay_install_upgrade | bool)

- name: Install or upgrade AUR packages via yay
  kewlfft.aur.aur:
    use: "{{ yay_install_use }}"
    name: "{{ (not (yay_install_upgrade | bool) and (yay_install_packages | length > 0)) | ternary(yay_install_packages, omit) }}"
    upgrade: "{{ (yay_install_upgrade | bool) | ternary(true, omit) }}"
    aur_only: "{{ yay_install_aur_only }}"
  become: true
  become_user: "{{ yay_install_become_user }}"
  when: (yay_install_packages | length > 0) or (yay_install_upgrade | bool)
