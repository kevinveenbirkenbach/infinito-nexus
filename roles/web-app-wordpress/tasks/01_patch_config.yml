# The seeds need to be executed as root, because www-data isn't allowed to create files in the wordpress directory

- name: "Strip stale Multisite bareword constants from {{ WORDPRESS_CONFIG_FILE }} (defensive, runs before any wp-cli call)"
  # Pre-fix runs of 06_multisite.yml wrote DOMAIN_CURRENT_SITE /
  # PATH_CURRENT_SITE with `wp config set --raw`, but Ansible's
  # `command:` module pipes through shlex, which strips the surrounding
  # single-quotes from `'blog.infinito.example'` before exec. wp-cli
  # then wrote
  #     define( 'DOMAIN_CURRENT_SITE', blog.infinito.example );
  # — a bareword PHP can't parse. Every subsequent `wp` CLI call
  # (including `wp core install` in 02_install.yml) PHP-loads wp-config
  # and dies on the parse error before we ever reach 06_multisite.yml's
  # rewrite. `wp config delete` would die for the same reason; only
  # textual sed survives an unparseable file. Drop these two lines
  # unconditionally — the canonical, properly quoted versions are
  # (re)written by 06_multisite.yml's string-write loop.
  command: >
    container exec --user root {{ WORDPRESS_CONTAINER }}
    sed -i -E "/^\s*define\(\s*'(DOMAIN_CURRENT_SITE|PATH_CURRENT_SITE)'\s*,.*\);\s*$/d"
    {{ WORDPRESS_DOCKER_CONF_PATH }}
  changed_when: true

- name: Update DB host in {{ WORDPRESS_CONFIG_FILE }}
  command: >
    container exec --user root {{ WORDPRESS_CONTAINER }}
    sed -i "s/define(\s*'DB_HOST'\s*,\s*'[^']*'\s*);/define( 'DB_HOST', '{{ lookup('database', application_id, 'host') | sed_escape('/') }}:{{ lookup('database', application_id, 'port') | sed_escape('/') }}' );/i" {{ WORDPRESS_DOCKER_CONF_PATH }}
  notify: compose up

- name: Update DB name in {{ WORDPRESS_CONFIG_FILE }}
  command: >
    container exec --user root {{ WORDPRESS_CONTAINER }}
    sed -i "s/define(\s*'DB_NAME'\s*,\s*'[^']*'\s*);/define( 'DB_NAME', '{{ lookup('database', application_id, 'name') | sed_escape('/') }}' );/i" {{ WORDPRESS_DOCKER_CONF_PATH }}
  notify: compose up

- name: Update DB user in {{ WORDPRESS_CONFIG_FILE }}
  command: >
    container exec --user root {{ WORDPRESS_CONTAINER }}
    sed -i "s/define(\s*'DB_USER'\s*,\s*'[^']*'\s*);/define( 'DB_USER', '{{ lookup('database', application_id, 'username') | sed_escape('/') }}' );/i" {{ WORDPRESS_DOCKER_CONF_PATH }}
  notify: compose up

- name: Update DB password in {{ WORDPRESS_CONFIG_FILE }}
  command: >
    container exec --user root {{ WORDPRESS_CONTAINER }}
    sed -i "s/define(\s*'DB_PASSWORD'\s*,\s*'[^']*'\s*);/define( 'DB_PASSWORD', '{{ lookup('database', application_id, 'password') | sed_escape('/') }}' );/i" {{ WORDPRESS_DOCKER_CONF_PATH }}
  notify: compose up
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Flush handlers to reinitialize new database credentials"
  meta: flush_handlers