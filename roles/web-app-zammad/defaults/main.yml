---
# Zammad Infrastructure Defaults
zammad_version: "6.5.0"
zammad_image: "zammad/zammad:{{ zammad_version }}"
zammad_memcached_image: "memcached:1.6-alpine"

# Networking 
zammad_main_domain: "helpdesk.infinito.example"
zammad_alias_domain: "zammad.infinito.example"

# System Performance
zammad_sysctl_max_map_count: 262144
zammad_timezone: "Europe/Berlin"

# Security (Stronger defaults for CI)
zammad_db_pass: "{{ vault_zammad_db_password | default('zammad_' + ansible_date_time.iso8601_basic_short | hash('sha256') | truncate(12, True, '')) }}"

# IAM / OpenID Connect Settings
zammad_oidc_enabled: "true"
zammad_oidc_display_name: "Infinito.Nexus Login"
zammad_oidc_client_id: "{{ vault_zammad_oidc_id | default('nexus_zammad_client') }}"
zammad_oidc_client_secret: "{{ vault_zammad_oidc_secret | default('nexus_zammad_secret') }}"
zammad_oidc_site: "https://iam.infinito.example/auth/realms/nexus"
