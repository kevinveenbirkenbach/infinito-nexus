# Matrix-deploy variant overrides per requirement 013. Variant 0 is
# the canonical OIDC variant (Jenkins's `oic-auth` plugin against
# Keycloak). Variant 1 flips the role onto the `ldap` plugin against
# `svc-db-openldap`.

# variant 0: OIDC variant (canonical default).
- {}

# variant 1: LDAP variant. Disable OIDC and enable LDAP so Jenkins's
# core LDAP plugin is the exercised auth path.
- services:
    oidc:
      enabled: false
    ldap:
      enabled: true
