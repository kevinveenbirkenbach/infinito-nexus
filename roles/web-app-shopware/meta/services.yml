logout:
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
# nocheck: dynamic-flag
# nocheck: oidc
oidc:
  enabled: false
  shared: false
# nocheck: dynamic-flag
# nocheck: oauth2
oauth2:
  enabled: false
  shared: false
dashboard:
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
mariadb:
  enabled: true  # nocheck: dynamic-flag
  shared: "{{ 'svc-db-mariadb' in group_names }}"
init:
  name: shopware-init
  cpus: 1.0
  mem_reservation: 1g
  mem_limit: 2g
shopware:
  image: composer
  version: '2.9'
  min_storage: 20GB
  package:
    name: shopware/production
    version: 6.7.8.2
  title: '{{ SOFTWARE_NAME }} Shop'
  ports:
    local:
      http: 8060
  run_after:
  - web-app-mailu
  lifecycle: beta
php:
  image: ghcr.io/shopware/docker-base
  version: '8.3'
web:
  name: shopware-web
  cpus: 1.0
  mem_reservation: 1g
  mem_limit: 2g
  ports:
    inter: 8000
worker:
  name: shopware-worker
  entrypoint:
  - php
  - bin/console
  - messenger:consume
  - async
  - low_priority
  - --time-limit=300
  - --memory-limit=512M
  replicas: 3
  cpus: 1.0
  mem_reservation: 1g
  mem_limit: 2g
scheduler:
  name: shopware-scheduler
  entrypoint:
  - php
  - bin/console
  - scheduled-task:run
  cpus: 0.5
  mem_reservation: 512m
  mem_limit: 1g
# nocheck: shared
# nocheck: dynamic-flag
redis:
  backup:
    disabled: true
  enabled: true
  image: redis
  version: 8-alpine
  cpus: 0.25
  mem_reservation: 256m
  mem_limit: 512m
# nocheck: shared
# nocheck: dynamic-flag
opensearch:
  enabled: true
  image: opensearchproject/opensearch
  version: 3.6.0
  name: shopware-opensearch
  cpus: 1.0
  mem_reservation: 2g
  mem_limit: 4g
# nocheck: dynamic-flag
css:
  enabled: true
  shared: true
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
