---
# Cleanup tasks for web-app-mattermost.
#
# GitLab OAuth2 (OIDC) enable/disable is controlled entirely via the
# MM_GITLABSETTINGS_ENABLE env var in templates/env.j2, which is set
# from MM_OIDC_ENABLED. Re-running the role with oidc.enabled: false
# will redeploy the container with GitLab OAuth disabled — no API call needed.

- name: "Mattermost | Cleanup — confirm OIDC state"
  debug:
    msg: >
      GitLab OAuth (OIDC) is {{ 'enabled' if MM_OIDC_ENABLED | bool else 'disabled' }}.
      MM_GITLABSETTINGS_ENABLE in env.j2 reflects this automatically on next deploy.
