fusiondirectory:
  ports:
    local:
      oauth2: 16487
      http: 8038
  run_after:
    - web-app-matomo
    - web-app-keycloak
    - web-app-mailu
  lifecycle: planned
  min_storage: 5GB
  cpus: '0.5'
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
prometheus:
  enabled: true
  shared: true
email:
  enabled: true
  shared: true
logout:
  enabled: true
  shared: true
