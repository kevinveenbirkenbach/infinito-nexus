# Matrix-deploy variant overrides per requirement 013. The LDAP
# marker stays on across both variants because LDAP IS the storage
# backend; variant 1 is essentially equivalent on FusionDirectory's
# side, the change is in how Keycloak federates user storage in
# variant 0.

# variant 0: OIDC variant (canonical default; oauth2-proxy gate).

- services:
    dashboard:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    ldap:
      shared: true
    logout:
      enabled: true
      shared: true
    oauth2:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true
- services:
    ldap:
      shared: false
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    oauth2:
      enabled: false
      shared: false
    prometheus:
      enabled: false
      shared: false
