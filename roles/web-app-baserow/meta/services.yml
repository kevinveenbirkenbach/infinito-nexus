logout:
  enabled: true
  shared: true
dashboard:
  enabled: true
  shared: true
matomo:
  enabled: true
  shared: true
email:
  enabled: true
  shared: true
oidc:
  enabled: false
  shared: false
ldap:
  enabled: false
  shared: false
oauth2:
  # Baserow Free Self-Hosted has no first-party OIDC adapter (Enterprise
  # only). Per requirement 013 the project uses `web-app-oauth2-proxy`
  # in front of the Baserow web UI as the universal glue path.
  enabled: true
  shared: false
  origin:
    host: application
    port: 80
  allowed_groups:
  - '{{ lookup(''rbac_group_path'', application_id=''web-app-baserow'', role=''administrator'') }}'
# noqa: shared
redis:
  backup:
    disabled: true
  enabled: true
postgres:
  enabled: true
  shared: true
baserow:
  backup:
    no_stop_required: true
  image: baserow/baserow
  version: 2.2.2
  name: baserow
  min_storage: 8GB
  cpus: 1.0
  mem_reservation: 0.5g
  mem_limit: 2g
  pids_limit: 512
  ports:
    local:
      http: 8017
      oauth2: 16495
  run_after:
  - web-app-matomo
  - web-app-keycloak
  - web-app-mailu
  lifecycle: beta
css:
  enabled: true
  shared: true
javascript:
  enabled: true
  shared: true
prometheus:
  enabled: true
  shared: true
