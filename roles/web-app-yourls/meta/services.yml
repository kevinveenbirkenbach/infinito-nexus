logout:
  enabled: true
  shared: true
dashboard:
  enabled: true
  shared: true
matomo:
  enabled: true
  shared: true
mariadb:
  enabled: true
  shared: true
yourls:
  version: latest
  name: yourls
  image: yourls
  min_storage: 1GB
  ports:
    local:
      oauth2: 16484
      http: 8006
  run_after:
  - web-app-matomo
  - web-app-keycloak
  lifecycle: beta
oauth2:
  enabled: true
  shared: true
  origin:
    host: application
    port: '80'
  allowed_groups:
  - '{{ lookup(''rbac_group_path'', application_id=''web-app-yourls'', role=''administrator'') }}'
  acl:
    blacklist:
    - '{{ lookup(''config'', ''web-app-yourls'', ''server.locations.admin'') }}'
css:
  enabled: true
  shared: true
# noqa: email
email:
  enabled: false
  shared: false
prometheus:
  enabled: true
  shared: true
