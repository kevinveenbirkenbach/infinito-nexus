---
# Matrix-deploy variant overrides for web-app-friendica.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# variant pinning every dynamic services.yml flag to true so the
# matrix exercises the in-group_names branch of web-app-friendica.
- services:
    css:
      enabled: true
      shared: true
    dashboard:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    ldap:
      shared: true
      enabled: true
    logout:
      enabled: true
      shared: true
    mariadb:
      shared: true
    matomo:
      enabled: true
      shared: true
    oauth2:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true

    # variant pinning every dynamic services.yml flag to false so the
    # matrix also exercises the out-of-group_names branch.
    oidc:
      enabled: true
      shared: true
- services:
    css:
      enabled: false
      shared: false
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    ldap:
      shared: false
      enabled: false
    logout:
      enabled: false
      shared: false
    mariadb:
      shared: false
    matomo:
      enabled: false
      shared: false
    oauth2:
      enabled: false
      shared: false
    prometheus:
      enabled: false
      shared: false
    oidc:
      enabled: false
      shared: false
- services:
    ldap:
      enabled: true
      shared: true
    oidc:
      enabled: false
      shared: false
    oauth2:
      enabled: false
      shared: false
