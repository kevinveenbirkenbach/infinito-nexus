friendica:
  image: friendica
  version: latest
  min_storage: 10GB
  addons:
    keycloakpassword: {}
    ldapauth: {}
  ports:
    local:
      oauth2: 16501
      http: 8028
  run_after:
  - web-app-matomo
  - web-app-keycloak
  lifecycle: beta
oidc:
  enabled: false
  shared: false
logout:
  enabled: true
  shared: true
ldap:
  enabled: true
  shared: true
dashboard:
  enabled: true
  shared: true
matomo:
  enabled: true
  shared: true
email:
  enabled: true
  shared: true
mariadb:
  enabled: true
  shared: true
oauth2:
  origin:
    host: application
    port: '80'
  enabled: true
  shared: true
css:
  enabled: false
  shared: true
prometheus:
  enabled: true
  shared: true
