---
- include_tasks: utils/once/flag.yml

- name: "load docker, db and proxy for {{ application_id }}"
  include_role:
    name: sys-stk-full
  vars:
    docker_compose_flush_handlers: false

- name: Integrate LDAP
  include_tasks: 02_ldap.yml
  when: FRIENDICA_LDAP_ENABLED | bool

# General
- name: "flush handlers to ensure that '{{ FRIENDICA_CONTAINER }}' is up before executing container tasks"
  meta: flush_handlers

- name: Check if Friendica local.config.php exists
  command: >
    container exec --user {{ FRIENDICA_USER }} {{ FRIENDICA_CONTAINER }} test -f {{ FRIENDICA_CONFIG_FILE }}
  register: friendica_config_exists
  changed_when: false
  failed_when: false

- name: Patch Friendica local.config.php with updated DB credentials
  include_tasks: 03_patch_config.yml
  when: friendica_config_exists.rc == 0

- name: Add Friendica Add Ons
  include_tasks: 04_addons.yml

- name: Bootstrap Friendica administrator user (only when no LDAP provider is wired to provision them)
  include_tasks: 06_user_bootstrap.yml
  when: not (FRIENDICA_LDAP_ENABLED | bool)
