---
# nocheck: dynamic-flag
# nocheck: oidc
oidc:
  enabled: false
  shared: false
# nocheck: dynamic-flag
# nocheck: oauth2
oauth2:
  enabled: false
  shared: false
  # TODO Enable oauth2 for matomo
# nocheck: dynamic-flag
logout:
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
# nocheck: dynamic-flag
# nocheck: dashboard
dashboard:
  enabled: false
  shared: false
matomo:
  enabled: true
  shared: true
  image: matomo
  version: latest
  name: matomo
  min_storage: 5GB
  backup:
    no_stop_required: true
  cpus: 1.0
  mem_reservation: 0.5g
  mem_limit: 1g
  pids_limit: 512
  site_name: Matomo on {{ DOMAIN_PRIMARY }}
  token:
    description: Created by {{ SOFTWARE_NAME }}
  excluded_ips: "{{ networks.internet.values() | list }}"
  ports:
    local:
      http: 8018
  lifecycle: beta
bootstrap:
  image: ghcr.io/kevinveenbirkenbach/matomo-bootstrap
  version: 1.1.13
  name: matomo-bootstrap
  profiles:
    - bootstrap
  timeout: 30
  cpus: 1.0
  mem_reservation: 0.5g
  mem_limit: 1g
  pids_limit: 512
  min_storage: 1GB
mariadb:
  enabled: true # nocheck: dynamic-flag
  shared: "{{ 'svc-db-mariadb' in group_names }}"
# nocheck: dynamic-flag
redis:
  backup:
    disabled: true
  enabled: false
# nocheck: dynamic-flag
css:
  enabled: false
  shared: true
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
