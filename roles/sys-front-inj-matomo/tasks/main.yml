# run_once_sys_front_inj_matomo: deactivated

# The Matomo API token may be empty on first deployment or when the Matomo container is
# already reachable but the bootstrap has not run yet (so sys-token-store never wrote the
# token file). In that case injection is skipped gracefully and retried on the next run.
# See docs/contributing/code/exceptions.md — "Matomo Token Not Yet Available".

- name: "Skip Matomo injection for '{{ domain }}' — token not yet available"
  ansible.builtin.debug:
    msg: "Matomo token users.administrator.tokens['web-app-matomo'] is empty. Skipping injection — Matomo may not be initialized yet."
  when: (users.administrator.tokens['web-app-matomo'] | default('') | string | trim) == ""

- name: "Inject Matomo tracking for '{{ domain }}'"
  include_tasks: inject.yml
  when: (users.administrator.tokens['web-app-matomo'] | default('') | string | trim) != ""
