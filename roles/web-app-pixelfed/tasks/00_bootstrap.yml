---
# The application container starts through a repo-managed entrypoint so Apache
# comes up first and the Ansible bootstrap can run without racing the image's
# first-start migration logic.

- name: "Wait until the Pixelfed application container finished its entrypoint bootstrap"
  ansible.builtin.command:
    argv:
      - container
      - exec
      - "{{ PIXELFED_CONTAINER }}"
      - sh
      - -lc
      - ps -ef | grep -v grep | grep -q "apache2 -DFOREGROUND"
  args:
    chdir: "{{ PIXELFED_INSTANCE_DIR }}"
  register: pixelfed_entrypoint_bootstrap
  changed_when: false
  retries: 120
  delay: 5
  until: pixelfed_entrypoint_bootstrap.rc == 0

- name: "Check whether the Pixelfed bootstrap marker exists"
  ansible.builtin.command:
    argv:
      - container
      - exec
      - "{{ PIXELFED_CONTAINER }}"
      - sh
      - -lc
      - test -e /var/www/storage/.docker.init
  args:
    chdir: "{{ PIXELFED_INSTANCE_DIR }}"
  register: pixelfed_bootstrap_marker_exists
  changed_when: false
  failed_when: false

- name: "Check whether the Pixelfed users table exists"
  vars:
    pixelfed_users_table_query: >-
      SELECT table_name
      FROM information_schema.tables
      WHERE table_schema='{{ PIXELFED_DB_NAME }}'
        AND table_name='users'
      LIMIT 1;
  ansible.builtin.command:
    argv: "{{ PIXELFED_MARIADB_ARGS + ['-e', pixelfed_users_table_query] }}"
  args:
    chdir: "{{ PIXELFED_INSTANCE_DIR }}"
  register: pixelfed_bootstrap_users_table
  changed_when: false
  failed_when: false
  retries: 20
  delay: 3
  until: pixelfed_bootstrap_users_table.rc == 0
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Count existing Pixelfed users when the users table already exists"
  vars:
    pixelfed_user_count_query: "SELECT COUNT(*) FROM users;"
  ansible.builtin.command:
    argv: "{{ PIXELFED_MARIADB_ARGS + ['-e', pixelfed_user_count_query] }}"
  args:
    chdir: "{{ PIXELFED_INSTANCE_DIR }}"
  when: pixelfed_bootstrap_users_table.stdout | trim == 'users'
  register: pixelfed_bootstrap_user_count
  changed_when: false
  retries: 20
  delay: 3
  until: pixelfed_bootstrap_user_count.rc == 0
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Choose Pixelfed migration strategy"
  ansible.builtin.set_fact:
    pixelfed_bootstrap_requires_reset: >-
      {{
        (pixelfed_bootstrap_marker_exists.rc | default(1) | int) != 0
        and (pixelfed_bootstrap_user_count.stdout | default('0') | trim | int) == 0
      }}
    pixelfed_migrate_argv: >-
      {{
        ['container', 'exec', '-u', PIXELFED_APP_USER, PIXELFED_CONTAINER, 'php', 'artisan']
        + (
          ['migrate:fresh', '--force']
          if (
            (pixelfed_bootstrap_marker_exists.rc | default(1) | int) != 0
            and (pixelfed_bootstrap_user_count.stdout | default('0') | trim | int) == 0
          )
          else ['migrate', '--force', '--isolated']
        )
      }}

- name: "Run Pixelfed migrations"
  ansible.builtin.command:
    argv: "{{ pixelfed_migrate_argv }}"
  args:
    chdir: "{{ PIXELFED_INSTANCE_DIR }}"
  register: pixelfed_migrate
  changed_when: "'Nothing to migrate' not in (pixelfed_migrate.stdout | default(''))"
  retries: 60
  delay: 5
  until: pixelfed_migrate.rc == 0

- name: "Ensure Pixelfed Passport keys exist"
  ansible.builtin.command:
    argv:
      - container
      - exec
      - -u
      - "{{ PIXELFED_APP_USER }}"
      - "{{ PIXELFED_CONTAINER }}"
      - sh
      - -lc
      - |
        if [ ! -f /var/www/storage/oauth-private.key ] || [ ! -f /var/www/storage/oauth-public.key ]; then
          php artisan passport:keys --force
        fi
  args:
    chdir: "{{ PIXELFED_INSTANCE_DIR }}"
  register: pixelfed_passport_keys
  changed_when: false
  retries: 20
  delay: 5
  until: pixelfed_passport_keys.rc == 0

- name: "Ensure the Pixelfed public storage symlink exists"
  ansible.builtin.command:
    argv:
      - container
      - exec
      - -u
      - "{{ PIXELFED_APP_USER }}"
      - "{{ PIXELFED_CONTAINER }}"
      - sh
      - -lc
      - |
        if [ ! -L /var/www/public/storage ]; then
          php artisan storage:link
        fi
  args:
    chdir: "{{ PIXELFED_INSTANCE_DIR }}"
  register: pixelfed_storage_link
  changed_when: false
  retries: 20
  delay: 5
  until: pixelfed_storage_link.rc == 0

- name: "Initialize the Pixelfed instance actor"
  ansible.builtin.command:
    argv:
      - container
      - exec
      - -u
      - "{{ PIXELFED_APP_USER }}"
      - "{{ PIXELFED_CONTAINER }}"
      - php
      - artisan
      - instance:actor
  args:
    chdir: "{{ PIXELFED_INSTANCE_DIR }}"
  register: pixelfed_instance_actor
  changed_when: false
  retries: 20
  delay: 5
  until: pixelfed_instance_actor.rc == 0

- name: "Mark Pixelfed bootstrap as complete for the worker container"
  ansible.builtin.command:
    argv:
      - container
      - exec
      - -u
      - "{{ PIXELFED_APP_USER }}"
      - "{{ PIXELFED_CONTAINER }}"
      - sh
      - -lc
      - |
        if [ ! -e /var/www/storage/.docker.init ]; then
          touch /var/www/storage/.docker.init
        fi
  args:
    chdir: "{{ PIXELFED_INSTANCE_DIR }}"
  register: pixelfed_bootstrap_marker
  changed_when: false
  retries: 20
  delay: 5
  until: pixelfed_bootstrap_marker.rc == 0
