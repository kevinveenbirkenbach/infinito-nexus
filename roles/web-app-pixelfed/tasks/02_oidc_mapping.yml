---
- name: "Wait until the Pixelfed OIDC mapping table exists"
  vars:
    pixelfed_admin_oidc_table_query: >-
      SELECT table_name
      FROM information_schema.tables
      WHERE table_schema='{{ PIXELFED_DB_NAME }}'
        AND table_name='user_oidc_mappings'
      LIMIT 1;
  ansible.builtin.command:
    argv: "{{ PIXELFED_MARIADB_ARGS + ['-e', pixelfed_admin_oidc_table_query] }}"
  args:
    chdir: "{{ PIXELFED_INSTANCE_DIR }}"
  register: pixelfed_admin_oidc_table
  changed_when: false
  failed_when: false
  retries: 60
  delay: 5
  until:
    - pixelfed_admin_oidc_table.rc == 0
    - pixelfed_admin_oidc_table.stdout | trim == 'user_oidc_mappings'
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Verify the Pixelfed OIDC mapping table contains the expected columns"
  vars:
    pixelfed_admin_oidc_columns_query: >-
      SELECT COUNT(*)
      FROM information_schema.columns
      WHERE table_schema='{{ PIXELFED_DB_NAME }}'
        AND table_name='user_oidc_mappings'
        AND column_name IN ('user_id', 'oidc_id', 'created_at', 'updated_at');
  ansible.builtin.command:
    argv: "{{ PIXELFED_MARIADB_ARGS + ['-e', pixelfed_admin_oidc_columns_query] }}"
  args:
    chdir: "{{ PIXELFED_INSTANCE_DIR }}"
  register: pixelfed_admin_oidc_columns
  changed_when: false
  failed_when: (pixelfed_admin_oidc_columns.stdout | trim | int) != 4
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Ensure the Pixelfed administrator OIDC mapping exists"
  vars:
    pixelfed_admin_oidc_query: >-
      INSERT INTO user_oidc_mappings (user_id, oidc_id, created_at, updated_at)
      VALUES ({{ pixelfed_admin_id.stdout | trim }}, '{{ PIXELFED_ADMIN_OIDC_ID }}', NOW(), NOW())
      ON DUPLICATE KEY UPDATE
        user_id = VALUES(user_id),
        updated_at = IF(user_id <> VALUES(user_id), NOW(), updated_at);
      SELECT ROW_COUNT();
  ansible.builtin.command:
    argv: "{{ PIXELFED_MARIADB_ARGS + ['-e', pixelfed_admin_oidc_query] }}"
  args:
    chdir: "{{ PIXELFED_INSTANCE_DIR }}"
  register: pixelfed_admin_oidc_mapping
  changed_when: (pixelfed_admin_oidc_mapping.stdout_lines | last | default('0') | int) > 0
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
