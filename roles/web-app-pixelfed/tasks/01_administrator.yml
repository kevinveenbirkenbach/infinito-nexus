---
- name: "Wait until the Pixelfed users table exists"
  vars:
    pixelfed_users_table_query: >-
      SELECT table_name
      FROM information_schema.tables
      WHERE table_schema='{{ PIXELFED_DB_NAME }}'
        AND table_name='users'
      LIMIT 1;
  ansible.builtin.command:
    argv: "{{ PIXELFED_MARIADB_ARGS + ['-e', pixelfed_users_table_query] }}"
  args:
    chdir: "{{ PIXELFED_INSTANCE_DIR }}"
  register: pixelfed_users_table
  changed_when: false
  failed_when: false
  retries: 60
  delay: 5
  until:
    - pixelfed_users_table.rc == 0
    - pixelfed_users_table.stdout | trim == 'users'
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Check whether the Pixelfed administrator already exists"
  vars:
    pixelfed_admin_id_query: "SELECT id FROM users WHERE username='{{ PIXELFED_ADMIN_USERNAME }}' LIMIT 1;"
  ansible.builtin.command:
    argv: "{{ PIXELFED_MARIADB_ARGS + ['-e', pixelfed_admin_id_query] }}"
  args:
    chdir: "{{ PIXELFED_INSTANCE_DIR }}"
  register: pixelfed_admin_id_existing
  changed_when: false
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Create the Pixelfed administrator via artisan"
  ansible.builtin.command:
    argv:
      - container
      - exec
      - -u
      - "{{ PIXELFED_APP_USER }}"
      - "{{ PIXELFED_CONTAINER }}"
      - php
      - artisan
      - user:create
      - "--name={{ PIXELFED_ADMIN_NAME }}"
      - "--username={{ PIXELFED_ADMIN_USERNAME }}"
      - "--email={{ PIXELFED_ADMIN_EMAIL }}"
      - "--password={{ PIXELFED_ADMIN_PASSWORD }}"
      - --is_admin=1
      - --confirm_email=1
  args:
    chdir: "{{ PIXELFED_INSTANCE_DIR }}"
  when: pixelfed_admin_id_existing.stdout | trim == ''
  register: pixelfed_admin_create
  changed_when: pixelfed_admin_create.rc == 0
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Resolve the Pixelfed administrator id"
  vars:
    pixelfed_admin_id_query: "SELECT id FROM users WHERE username='{{ PIXELFED_ADMIN_USERNAME }}' LIMIT 1;"
  ansible.builtin.command:
    argv: "{{ PIXELFED_MARIADB_ARGS + ['-e', pixelfed_admin_id_query] }}"
  args:
    chdir: "{{ PIXELFED_INSTANCE_DIR }}"
  register: pixelfed_admin_id
  changed_when: false
  failed_when: pixelfed_admin_id.stdout | trim == ''
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
