---
# Configure OIDC (Keycloak) provider for Odoo

- name: "Check if Keycloak OAuth provider exists"
  community.postgresql.postgresql_query:
    db: "{{ ODOO_DB_NAME }}"
    login_user: "{{ lookup('database', application_id, 'username') }}"
    login_password: "{{ lookup('database', application_id, 'password') }}"
    login_host: "{{ lookup('database', application_id, 'reach_host') }}"
    login_port: "{{ lookup('database', application_id, 'port') }}"
    query: "SELECT id FROM auth_oauth_provider WHERE name = 'Keycloak' LIMIT 1;"
  register: oauth_check

- name: "Update existing Keycloak OAuth provider"
  community.postgresql.postgresql_query:
    db: "{{ ODOO_DB_NAME }}"
    login_user: "{{ lookup('database', application_id, 'username') }}"
    login_password: "{{ lookup('database', application_id, 'password') }}"
    login_host: "{{ lookup('database', application_id, 'reach_host') }}"
    login_port: "{{ lookup('database', application_id, 'port') }}"
    query: >
      UPDATE auth_oauth_provider SET
        enabled = True,
        auth_endpoint = '{{ ODOO_OIDC_AUTHORIZE_URL }}',
        validation_endpoint = '{{ ODOO_OIDC_USERINFO_URL }}',
        data_endpoint = '{{ ODOO_OIDC_USERINFO_URL }}',
        client_id = '{{ ODOO_OIDC_CLIENT_ID }}',
        scope = 'openid email profile',
        css_class = 'fa fa-fw fa-key',
        body = '{"en_US": "Login with SSO"}',
        write_date = NOW()
      WHERE name = 'Keycloak';
  when: oauth_check.query_result | length > 0

- name: "Create new Keycloak OAuth provider"
  community.postgresql.postgresql_query:
    db: "{{ ODOO_DB_NAME }}"
    login_user: "{{ lookup('database', application_id, 'username') }}"
    login_password: "{{ lookup('database', application_id, 'password') }}"
    login_host: "{{ lookup('database', application_id, 'reach_host') }}"
    login_port: "{{ lookup('database', application_id, 'port') }}"
    query: >
      INSERT INTO auth_oauth_provider
      (name, enabled, auth_endpoint, validation_endpoint, data_endpoint, client_id, scope, css_class, body, sequence, create_date, write_date)
      VALUES (
        'Keycloak',
        True,
        '{{ ODOO_OIDC_AUTHORIZE_URL }}',
        '{{ ODOO_OIDC_USERINFO_URL }}',
        '{{ ODOO_OIDC_USERINFO_URL }}',
        '{{ ODOO_OIDC_CLIENT_ID }}',
        'openid email profile',
        'fa fa-fw fa-key',
        '{"en_US": "Login with SSO"}',
        10,
        NOW(),
        NOW()
      );
  when: oauth_check.query_result | length == 0

- name: "Enable OAuth authentication in system parameters"
  community.postgresql.postgresql_query:
    db: "{{ ODOO_DB_NAME }}"
    login_user: "{{ lookup('database', application_id, 'username') }}"
    login_password: "{{ lookup('database', application_id, 'password') }}"
    login_host: "{{ lookup('database', application_id, 'reach_host') }}"
    login_port: "{{ lookup('database', application_id, 'port') }}"
    query: >
      INSERT INTO ir_config_parameter (key, value, create_date, write_date)
      VALUES ('auth_oauth.oauth_providers', 'True', NOW(), NOW())
      ON CONFLICT (key) DO UPDATE SET value = 'True', write_date = NOW();

- name: "Set web.base.url for HTTPS redirects"
  community.postgresql.postgresql_query:
    db: "{{ ODOO_DB_NAME }}"
    login_user: "{{ lookup('database', application_id, 'username') }}"
    login_password: "{{ lookup('database', application_id, 'password') }}"
    login_host: "{{ lookup('database', application_id, 'reach_host') }}"
    login_port: "{{ lookup('database', application_id, 'port') }}"
    query: >
      INSERT INTO ir_config_parameter (key, value, create_date, write_date)
      VALUES ('web.base.url', %(base_url)s, NOW(), NOW())
      ON CONFLICT (key) DO UPDATE SET value = %(base_url)s, write_date = NOW();
    named_args:
      base_url: "{{ ODOO_URL }}"

- name: "Freeze web.base.url to prevent automatic detection"
  community.postgresql.postgresql_query:
    db: "{{ ODOO_DB_NAME }}"
    login_user: "{{ lookup('database', application_id, 'username') }}"
    login_password: "{{ lookup('database', application_id, 'password') }}"
    login_host: "{{ lookup('database', application_id, 'reach_host') }}"
    login_port: "{{ lookup('database', application_id, 'port') }}"
    query: >
      INSERT INTO ir_config_parameter (key, value, create_date, write_date)
      VALUES ('web.base.url.freeze', 'True', NOW(), NOW())
      ON CONFLICT (key) DO UPDATE SET value = 'True', write_date = NOW();
