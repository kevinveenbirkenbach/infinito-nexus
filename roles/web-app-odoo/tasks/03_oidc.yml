---
# Configure OIDC (Keycloak) provider for Odoo.
#
# All SQL bodies are extracted to roles/web-app-odoo/files/oidc/*.sql so
# they parse cleanly with SQL tooling. The shared connection params
# (db / user / password / host / port) are deduplicated into the
# `_odoo_db` block-vars below.

- name: "Configure OIDC (Keycloak) for Odoo"
  module_defaults:
    community.postgresql.postgresql_query:
      db: "{{ ODOO_DB_NAME }}"
      login_user: "{{ lookup('database', application_id, 'username') }}"
      login_password: "{{ lookup('database', application_id, 'password') }}"
      login_host: "{{ lookup('database', application_id, 'reach_host') }}"
      login_port: "{{ lookup('database', application_id, 'port') }}"
  block:

    - name: "Check if Keycloak OAuth provider exists"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/select_keycloak_provider_id.sql') }}"
      register: oauth_check

    - name: "Update existing Keycloak OAuth provider"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/update_keycloak_provider.sql') }}"
        named_args:
          auth_endpoint: "{{ ODOO_OIDC_AUTHORIZE_URL }}"
          userinfo_endpoint: "{{ ODOO_OIDC_USERINFO_URL }}"
          client_id: "{{ ODOO_OIDC_CLIENT_ID }}"
      when: oauth_check.query_result | length > 0

    - name: "Create new Keycloak OAuth provider"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/insert_keycloak_provider.sql') }}"
        named_args:
          auth_endpoint: "{{ ODOO_OIDC_AUTHORIZE_URL }}"
          userinfo_endpoint: "{{ ODOO_OIDC_USERINFO_URL }}"
          client_id: "{{ ODOO_OIDC_CLIENT_ID }}"
      when: oauth_check.query_result | length == 0

    - name: "Enable OAuth authentication in system parameters"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/upsert_ir_config_parameter.sql') }}"
        named_args:
          key: "auth_oauth.oauth_providers"
          value: "True"

    - name: "Enable OAuth signup (allow user creation on first OAuth login)"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/upsert_ir_config_parameter.sql') }}"
        named_args:
          key: "auth_signup.invitation_scope"
          value: "b2c"

    - name: "Allow uninvited OAuth signup on website"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/update_website_uninvited_b2c.sql') }}"

    # Create an internal user template for OAuth signup. New users
    # inherit this user's groups via base.template_portal_user_id /
    # auth_signup.template_user_id.
    - name: "Check if OAuth template user exists"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/select_oauth_template_user.sql') }}"
      register: oauth_template_check

    - name: "Create OAuth template partner"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/insert_oauth_template_partner.sql') }}"
      register: oauth_template_partner
      when: oauth_template_check.query_result | length == 0

    - name: "Create OAuth template user"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/insert_oauth_template_user.sql') }}"
        named_args:
          partner_id: "{{ oauth_template_partner.query_result[0].id }}"
      register: oauth_template_user
      when:
        - oauth_template_check.query_result | length == 0
        - oauth_template_partner.query_result is defined
        - oauth_template_partner.query_result | length > 0

    - name: "Ensure OAuth template user is active"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/update_activate_oauth_template.sql') }}"

    - name: "Grant Internal User group to OAuth template"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/grant_internal_user_to_oauth_template.sql') }}"

    - name: "Grant company access to OAuth template"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/grant_company_to_oauth_template.sql') }}"

    # Set the template user id for both knobs:
    # - base.template_portal_user_id is consumed by
    #   _create_user_from_template() during signup.
    # - auth_signup.template_user_id is what the Odoo UI settings page
    #   displays; we set both for consistency.
    - name: "Set OAuth template user for signup (base.template_portal_user_id)"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/upsert_ir_config_parameter_template_user_id.sql') }}"
        named_args:
          key: "base.template_portal_user_id"

    - name: "Set OAuth template user for signup (auth_signup.template_user_id)"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/upsert_ir_config_parameter_template_user_id.sql') }}"
        named_args:
          key: "auth_signup.template_user_id"

    - name: "Use Authorization header for OAuth token validation"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/upsert_ir_config_parameter.sql') }}"
        named_args:
          key: "auth_oauth.authorization_header"
          value: "True"

    - name: "Set web.base.url for HTTPS redirects"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/upsert_ir_config_parameter.sql') }}"
        named_args:
          key: "web.base.url"
          value: "{{ ODOO_URL }}"

    - name: "Freeze web.base.url to prevent automatic detection"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/upsert_ir_config_parameter.sql') }}"
        named_args:
          key: "web.base.url.freeze"
          value: "True"

    # Repair fallback for users created before
    # base.template_portal_user_id was set correctly. New OAuth signups
    # inherit the group from the template, but legacy users do not.
    - name: "Grant Internal User group to OAuth-created users"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/grant_internal_user_to_oauth_users_repair.sql') }}"

    # Link existing Odoo users to Keycloak for SSO.
    - name: "Get Keycloak OAuth provider id in Odoo"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/select_keycloak_provider_id.sql') }}"
      register: keycloak_provider

    - name: "Query Keycloak DB for administrator username"
      community.postgresql.postgresql_query:
        db: "{{ lookup('database', 'web-app-keycloak', 'name') }}"
        login_user: "{{ lookup('database', 'web-app-keycloak', 'username') }}"
        login_password: "{{ lookup('database', 'web-app-keycloak', 'password') }}"
        login_host: "{{ lookup('database', 'web-app-keycloak', 'reach_host') }}"
        login_port: "{{ lookup('database', 'web-app-keycloak', 'port') }}"
        query: "{{ lookup('file', 'oidc/select_keycloak_realm_user.sql') }}"
        named_args:
          realm: "{{ OIDC.CLIENT.REALM }}"
          admin: "{{ lookup('users', 'administrator').username }}"
      register: keycloak_users
      when: keycloak_provider.query_result | length > 0

    - name: "Link administrator user to Keycloak in Odoo"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/update_user_oauth_link.sql') }}"
        named_args:
          provider_id: "{{ keycloak_provider.query_result[0].id }}"
          oauth_uid: "{{ (keycloak_users.query_result | selectattr('username', 'equalto', lookup('users', 'administrator').username) | first).username }}"
          login: "{{ lookup('users', 'administrator').username }}"
      when:
        - keycloak_provider.query_result | length > 0
        - keycloak_users.query_result | selectattr('username', 'equalto', lookup('users', 'administrator').username) | list | length > 0

    # Auto-created OAuth users get portal access by default. Promote
    # them to internal-user + default-company so they can reach the
    # main Odoo interface.
    - name: "Grant internal user access to OAuth-created users"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/grant_internal_user_to_oauth_signup_users.sql') }}"
      when: keycloak_provider.query_result | length > 0

    - name: "Grant company access to OAuth-created users"
      community.postgresql.postgresql_query:
        query: "{{ lookup('file', 'oidc/grant_company_to_oauth_signup_users.sql') }}"
      when: keycloak_provider.query_result | length > 0

# Note: Non-admin users (like biber) are auto-created via OAuth signup
# when they first SSO login. The auth_signup.invitation_scope = 'b2c'
# setting enables this. Users are defined in
# inventories/development/default.yml and created in LDAP by
# svc-db-openldap, then federated to Keycloak for SSO authentication.
# The tasks above ensure OAuth-created users get internal access and
# company membership.
