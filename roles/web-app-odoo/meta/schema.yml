credentials:
  administrator_password:
    description: Initial password for the Odoo administrator user
    algorithm: sha256
    validation: ^[a-f0-9]{64}$
  database_password:
    description: Password for the Odoo database user
    algorithm: bcrypt
    validation: ^\$2[aby]\$.{56}$
  master_password:
    description: Odoo master password for database management
    algorithm: plaintext
    validation: ^[a-zA-Z0-9]{32,}$
