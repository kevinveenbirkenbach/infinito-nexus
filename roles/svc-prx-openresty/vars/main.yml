# General
application_id:       "svc-prx-openresty"


# Openresty

# Probapbly hard to implement to use dynamic entity_name here, so sticking with hard coded entity in conf path
OPENRESTY_IMAGE:      "{{ lookup('config','svc-prx-openresty', 'compose.services.openresty.image') }}"
OPENRESTY_VERSION:    "{{ lookup('config','svc-prx-openresty', 'compose.services.openresty.version') }}"
OPENRESTY_CONTAINER:  "{{ lookup('config','svc-prx-openresty', 'compose.services.openresty.name') }}"

# Custom-built image — distinguished from the upstream pull image to make it
# clear in compose.yml.j2 that this container is locally built, not pulled.
OPENRESTY_CUSTOM_IMAGE:   "openresty_custom"
OPENRESTY_CUSTOM_VERSION: "{{ OPENRESTY_VERSION }}"

# Lua file download URLs — passed as Dockerfile build args so the mirror system
# can substitute them without touching the Dockerfile itself.
OPENRESTY_PROMETHEUS_ENABLED:       "{{ ('web-app-prometheus' in applications) | lower }}"
OPENRESTY_LUA_PROMETHEUS_URL_MAIN:    "https://raw.githubusercontent.com/knyar/nginx-lua-prometheus/master/prometheus.lua"
OPENRESTY_LUA_PROMETHEUS_URL_COUNTER: "https://raw.githubusercontent.com/knyar/nginx-lua-prometheus/master/prometheus_resty_counter.lua"
OPENRESTY_LUA_PROMETHEUS_URL_KEYS:    "https://raw.githubusercontent.com/knyar/nginx-lua-prometheus/master/prometheus_keys.lua"
