logout:
  enabled: false
  shared: false
dashboard:
  enabled: true
  shared: true
matomo:
  enabled: true
  shared: true
css:
  enabled: true
  shared: true
javascript:
  enabled: true
  shared: true
littlejs:
  image: nginx
  version: alpine
  ports:
    local:
      http: 8063
  run_after:
    - web-app-matomo
  lifecycle: alpha
# noqa: email
  min_storage: 5GB
  cpus: '0.5'
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
email:
  enabled: false
  shared: false
prometheus:
  enabled: true
  shared: true
