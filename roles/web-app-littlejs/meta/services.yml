# nocheck: dynamic-flag
# nocheck: logout
logout:
  enabled: false
  shared: false
# nocheck: dynamic-flag
# nocheck: oidc
oidc:
  enabled: false
  shared: false
# nocheck: dynamic-flag
# nocheck: oauth2
oauth2:
  enabled: false
  shared: false
dashboard:
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
# nocheck: dynamic-flag
css:
  enabled: true
  shared: true
# nocheck: dynamic-flag
javascript:
  enabled: true
  shared: true
littlejs:
  image: nginx
  version: alpine
  ports:
    local:
      http: 8063
  run_after:
    - web-app-matomo
  lifecycle: alpha
  min_storage: 5GB
  cpus: '0.5'
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
# nocheck: email
# nocheck: dynamic-flag
email:
  enabled: false
  shared: false
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
