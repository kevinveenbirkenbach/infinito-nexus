mariadb:
  enabled: "{{ 'svc-db-mariadb' in group_names }}"
  shared: "{{ 'svc-db-mariadb' in group_names }}"
  version: latest
  image: mariadb
  name: mariadb
  min_storage: 10GB
  backup:
    database_routine: true
  cpus: '2.0'
  mem_reservation: 2g
  mem_limit: 4g
  pids_limit: 1024
  ports:
    local:
      mariadb: 3306
  lifecycle: beta
