application_id:         svc-db-mariadb
entity_name:            "{{ application_id | get_entity_name }}"
database_type:          "{{ entity_name }}"

MARIADB_ROOT_PWD:       "{{ lookup('config', application_id, 'credentials.root_password') }}"
MARIADB_SUBNET:         "{{ lookup('config', 'svc-db-mariadb', 'server.networks.local.subnet') }}"
MARIADB_NETWORK:        "{{ application_id | get_entity_name }}"
MARIADB_VOLUME:         "{{ lookup('config', application_id, 'volumes.data') }}"
MARIADB_IMAGE:          "{{ lookup('config', application_id, 'services.' ~ entity_name ~ '.image') }}"
MARIADB_VERSION:        "{{ lookup('config', application_id, 'services.' ~ entity_name ~ '.version') }}"
MARIADB_NAME:           "{{ lookup('config', application_id, 'services.' ~ entity_name ~ '.name') }}"
MARIADB_PORT:           "{{ database_port | default(lookup('config', application_id, 'services.mariadb.ports.local.database')) }}"
MARIADB_HOST:           "127.0.0.1"
MARIADB_CUSTOM_IMAGE:   "{{ entity_name }}_custom:{{ MARIADB_VERSION }}"
MARIADB_HEALTHCHECK_DB: "{{ SOFTWARE_DOMAIN | regex_replace('[^a-z0-9]+', '_') }}_healthcheck"

# Host behavior stays unchanged (True).
# In CI/act container environments we avoid publishing ports to prevent iptables/nft issues.
MARIADB_EXPOSE_LOCAL:   "{{ not DOCKER_IN_CONTAINER | bool }}"

# If the desired root password doesn't work, allow an automated reset without knowing the previous password.
# This uses a recovery container with --skip-grant-tables (downtime). Keep disabled by default.
MARIADB_ALLOW_RESET_WITHOUT_PREVIOUS: true
