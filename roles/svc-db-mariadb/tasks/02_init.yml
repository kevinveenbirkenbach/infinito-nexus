---
- block:
    - name: "Create database: {{ database_name }} (host via mysql_db)"
      community.mysql.mysql_db:
        name: "{{ database_name }}"
        state: present
        login_user: root
        login_password: "{{ MARIADB_ROOT_PWD }}"
        login_host: "{{ MARIADB_HOST }}"
        login_port: "{{ MARIADB_PORT }}"
        encoding: "{{ MARIADB_ENCODING }}"
        collation: "{{ MARIADB_COLLATION }}"
        config_file: ""

    - name: "Create database user: {{ database_username }} (host via mysql_user)"
      community.mysql.mysql_user:
        name: "{{ database_username }}"
        password: "{{ database_password }}"
        host: "%"
        priv: "`{{ database_name }}`.*:ALL"
        state: present
        login_user: root
        login_password: "{{ MARIADB_ROOT_PWD }}"
        login_host: "{{ MARIADB_HOST }}"
        login_port: "{{ MARIADB_PORT }}"
        config_file: ""
  when: MARIADB_EXPOSE_LOCAL | bool

# ---------------------------------------------------------------------------
# CI / Container path: no port publishing → initialize via container exec
# ---------------------------------------------------------------------------
- block:
    - name: "Create database: {{ database_name }} (container via mariadb CLI)"
      ansible.builtin.command:
        argv:
          - container
          - exec
          - -i
          - "{{ MARIADB_NAME }}"
          - mariadb
          - -uroot
          - "-p{{ MARIADB_ROOT_PWD }}"
        stdin: |
          SET @db_name   := '{{ database_name }}';
          SET @charset   := '{{ MARIADB_ENCODING }}';
          SET @collation := '{{ MARIADB_COLLATION }}';
          {{ lookup('file', role_path ~ '/files/sql/create_database.sql') }}
      register: mariadb_create_db
      no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
      changed_when: false

    - name: "Create database user + grant privileges (container via mariadb CLI)"
      ansible.builtin.command:
        argv:
          - container
          - exec
          - -i
          - "{{ MARIADB_NAME }}"
          - mariadb
          - -uroot
          - "-p{{ MARIADB_ROOT_PWD }}"
        stdin: |
          SET @db_user := '{{ database_username }}';
          SET @db_pwd  := '{{ database_password | replace("'", "''") }}';
          SET @db_name := '{{ database_name }}';
          {{ lookup('file', role_path ~ '/files/sql/create_user_grant.sql') }}
      register: mariadb_create_user
      no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
      changed_when: false
  when: not (MARIADB_EXPOSE_LOCAL | bool)
