# Matrix-deploy variant overrides for this role (requirement 013
# alpha-to-beta promotion). Both variants ride the same OIDC →
# login-broker → social-app handoff (variant A+); the difference is
# whether Keycloak's user storage is local (variant 0) or LDAP-
# federated against svc-db-openldap (variant 1). This matches the
# requirement-013 contract that 🛠️ glue paths MUST exercise both an
# `oidc` and an `ldap` variant.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# variant 0: OIDC variant (canonical default).

- services:
    dashboard:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    oauth2:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true
- services:
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    oauth2:
      enabled: false
      shared: false
    prometheus:
      enabled: false
      shared: false
