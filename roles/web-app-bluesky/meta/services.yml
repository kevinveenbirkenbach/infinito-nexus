logout:
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
oauth2:
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  origin:
    host: bluesky-broker
    port: 8080
  # ACL — the role serves THREE domains (web/api/view) via the same
  # front-proxy oauth2 stack. Federation traffic to `api.bluesky.<DOMAIN>`
  # MUST stay reachable without an OIDC redirect, otherwise other PDS
  # instances and the AT Protocol relays cannot read account
  # descriptors. The PDS exposes its public surface under `/xrpc/*`
  # and `/.well-known/*`; both are whitelisted so they bypass the
  # gate. The default `/` path is gated and routes through
  # oauth2-proxy → bluesky-broker → social-app (the user-visible web
  # UI lives at `web.bluesky.<DOMAIN>`).
  acl:
    whitelist:
      - /xrpc/
      - /.well-known/
      - /robots.txt
  allowed_groups:
  - '{{ lookup(''rbac_group_path'', application_id=''web-app-bluesky'', role=''administrator'') }}'
# noqa: shared
# nocheck: dynamic-flag
web:
  enabled: true
  ports:
    local:
      http: 8031
      oauth2: 16496
# nocheck: dynamic-flag
view:
  enabled: false
  ports:
    local:
      http: 8051
pds:
  image: ghcr.io/bluesky-social/pds
  version: latest
broker:
  # Login-broker sidecar that owns the OIDC → PDS app-password
  # handoff and the AES-256-GCM-encrypted user attribute. The image
  # is built from `files/login-broker/`.
  name: bluesky-broker
  image: bluesky-broker
  port: 8080
  ports:
    local:
      http: 8076
# nocheck: dynamic-flag
css:
  enabled: true
  shared: true
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
api:
  ports:
    local:
      http: 8030
bluesky:
  ports:
    local:
      # oauth2-proxy listens here; the front-proxy routes the gated
      # default `/` path through this port. Picked so it doesn't
      # collide with the existing api/web/view bindings above.
      oauth2: 16497
  run_after:
  - web-app-matomo
  - web-app-keycloak
  - web-app-mailu
  lifecycle: beta
