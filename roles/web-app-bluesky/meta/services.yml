logout:
  enabled: true
  shared: true
dashboard:
  enabled: true
  shared: true
matomo:
  enabled: true
  shared: true
email:
  enabled: true
  shared: true
# noqa: shared
web:
  enabled: true
  ports:
    local:
      http: 8031
view:
  enabled: false
  ports:
    local:
      http: 8051
pds:
  image: ghcr.io/bluesky-social/pds
  version: latest
css:
  enabled: true
  shared: true
prometheus:
  enabled: true
  shared: true
api:
  ports:
    local:
      http: 8030
bluesky:
  run_after:
  - web-app-matomo
  - web-app-keycloak
  - web-app-mailu
  lifecycle: pre-alpha
