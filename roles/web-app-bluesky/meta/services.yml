logout:
  enabled: true
  shared: true
dashboard:
  enabled: true
  shared: true
matomo:
  enabled: true
  shared: true
email:
  enabled: true
  shared: true
# noqa: shared
web:
  enabled: true
  ports:
    local:
      http: 8031
  min_storage: 5GB
  cpus: '0.5'
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
view:
  enabled: false
  ports:
    local:
      http: 8051
  min_storage: 1GB
  cpus: '0.2'
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
pds:
  image: ghcr.io/bluesky-social/pds
  version: latest
  min_storage: 10GB
  cpus: '1.0'
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 1024
css:
  enabled: true
  shared: true
prometheus:
  enabled: true
  shared: true
api:
  ports:
    local:
      http: 8030
  min_storage: 5GB
  cpus: '0.5'
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
bluesky:
  run_after:
    - web-app-matomo
    - web-app-keycloak
    - web-app-mailu
  lifecycle: pre-alpha
