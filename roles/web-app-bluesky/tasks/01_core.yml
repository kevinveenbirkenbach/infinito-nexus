- include_tasks: utils/once/flag.yml

# The Bluesky web container is built from a checked-out social-app repo at
# `/opt/compose/bluesky/services/social-app`. The git clone (03_social_app)
# MUST run before sys-svc-compose generates compose.yml + flushes its build
# handlers, otherwise `compose build` fires against a missing build context.
# Pre-create the services directory and clone the repo here, before any
# compose-touching include.
- name: "Ensure social-app services directory exists"
  ansible.builtin.file:
    path: "{{ BLUESKY_SOCIAL_APP_DIR | dirname }}"
    state: directory
    mode: "0755"
  when: BLUESKY_WEB_ENABLED | bool

- name: "Clone social-app build context (pre-compose)"
  ansible.builtin.include_tasks: "03_social_app.yml"
  when: BLUESKY_WEB_ENABLED | bool

- name: "Stage login-broker build context (pre-compose)"
  ansible.builtin.include_tasks: "06_login_broker.yml"
  when: BLUESKY_WEB_ENABLED | bool

# Bind-mount safety: if a previous role-iteration ran without
# sys-stk-backend (services.oauth2.enabled was effectively off), the
# oauth2-proxy container will have created the missing
# `oauth2-proxy-keycloak.cfg` bind-mount source as an EMPTY DIRECTORY.
# A subsequent deploy that templates the config would then write the
# rendered cfg INSIDE that directory instead of replacing it, and
# the oauth2-proxy keeps restart-looping with "is a directory". Heal
# that corruption defensively before sys-stk-backend pulls the
# oauth2-proxy template back in.
- name: "Heal oauth2-proxy cfg bind-mount corruption (if it became a directory in a prior deploy)"
  ansible.builtin.shell: >-
    if [ -d "{{ BLUESKY_OAUTH2_PROXY_CFG_PATH }}" ]; then
      container stop "{{ BLUESKY_OAUTH2_PROXY_CONTAINER }}" 2>/dev/null || true;
      rm -rf "{{ BLUESKY_OAUTH2_PROXY_CFG_PATH }}";
    fi
  args:
    executable: /bin/bash
  changed_when: false

# Use sys-stk-backend (not sys-svc-compose directly) so that the
# oauth2-proxy sidecar is auto-included when `services.oauth2.enabled`
# is true (variant A+ login-broker gate per requirement 013). The
# sys-stk-backend role internally loads sys-svc-compose for the
# compose layer and additionally pulls in web-app-oauth2-proxy and
# its deterministic config template. Without this, oauth2-proxy
# starts with /oauth2-proxy.cfg as an empty bind-mounted directory
# and the sidecar restart-loops.
- name: "include sys-stk-backend role"
  include_role:
    name: sys-stk-backend
  vars:
    docker_compose_flush_handlers: false

- name: "Include front proxy for {{ BLUESKY_API_DOMAIN }}:{{ BLUESKY_API_PORT }}"
  include_role:
    name: sys-stk-front-proxy
  vars:
    domain: "{{ BLUESKY_API_DOMAIN }}"
    http_port: "{{ BLUESKY_API_PORT }}"

- name: "Include front proxy for {{ BLUESKY_WEB_DOMAIN }}:{{ BLUESKY_BROKER_PORT }} (broker is the upstream so the variant-A+ handoff fires for every authenticated request)"
  include_role:
    name: sys-stk-front-proxy
  vars:
    domain:                         "{{ BLUESKY_WEB_DOMAIN }}"
    http_port:                      "{{ BLUESKY_BROKER_PORT }}"
    webserver_extra_configuration:  "{{ BLUESKY_FRONT_PROXY_CONTENT }}"
  when: BLUESKY_WEB_ENABLED | bool

- name: "Include front proxy for {{ BLUESKY_VIEW_DOMAIN_FINAL }}:{{ BLUESKY_VIEW_PORT }}"
  include_role:
    name: sys-stk-front-proxy
  vars:
    domain:     "{{ BLUESKY_VIEW_DOMAIN_FINAL }}"
    http_port:  "{{ BLUESKY_VIEW_PORT }}"
  when: BLUESKY_VIEW_ENABLED | bool

- name: "Execute PDS routines"
  ansible.builtin.include_tasks: "02_pds.yml"

# 03_social_app already ran before sys-svc-compose (above) so that the
# compose build handler finds the cloned context.

- name: "DNS for Bluesky"
  include_tasks: "04_dns.yml"
  when: DNS_PROVIDER | lower == 'cloudflare'

- name: Resolve redirect_domain_mappings now (before include_role)
  set_fact:
    BLUESKY_REDIRECT_DOMAIN_MAPPINGS: >-
      {{
        ( (BLUESKY_WEB_ENABLED  | bool) | ternary([], [ {'source': BLUESKY_WEB_DOMAIN,  'target': BLUESKY_API_DOMAIN } ]) )
        + ( (BLUESKY_VIEW_ENABLED | bool) | ternary([], [ {'source': BLUESKY_VIEW_DOMAIN_LOCAL, 'target': BLUESKY_API_DOMAIN } ]) )
      }}

- name: "Redirect deactivated BlueSky Services to {{ BLUESKY_API_DOMAIN }}"
  include_tasks: "utils/load_app.yml"
  vars:
    load_app_id:                        "web-opt-rdr-domains"
    redirect_domain_mappings:           "{{ BLUESKY_REDIRECT_DOMAIN_MAPPINGS }}"
    web_opt_rdr_domains_logout_enabled: true

- name: "Flush handlers for '{{ role_name }}'"
  meta: flush_handlers
