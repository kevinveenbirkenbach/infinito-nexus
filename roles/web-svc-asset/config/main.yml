source_directory: "{{ playbook_dir }}/assets"
url:              "//<< defaults_applications['web-svc-file']server.domains.canonical[0] >>/assets"
server:
  domains:
    canonical:
      - asset.{{ DOMAIN_PRIMARY }}
    aliases: []
compose:
  services:
    asset:
      enabled: false
      shared: true
    # Assets are published through the shared file host under /assets.
    # Keep the file dependency here so consumers only depend on web-svc-asset.
    file:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    css:
      enabled: false
      shared: false
    prometheus:
      enabled: true
      shared: true
