- name: "XWIKI | Check if Main.WebHome exists"
  uri:
    url: "{{ [XWIKI_REST_BASE, 'wikis/xwiki/spaces/Main/pages/WebHome'] | url_join }}"
    method: GET
    url_username: "{{ XWIKI_SUPERADMIN_USERNAME }}"
    url_password: "{{ XWIKI_SUPERADMIN_PASSWORD }}"
    force_basic_auth: true
    status_code: [200, 404]
    return_content: no
  register: _main_webhome_check
  changed_when: false

- name: "XWIKI | Fetch REST session + form token (Main.WebHome write ops)"
  include_tasks: _rest_session.yml
  when: _main_webhome_check.status == 404

- name: "XWIKI | Create Main.WebHome if missing"
  uri:
    url: "{{ [XWIKI_REST_BASE, 'wikis/xwiki/spaces/Main/pages/WebHome'] | url_join }}"
    method: PUT
    url_username: "{{ XWIKI_SUPERADMIN_USERNAME }}"
    url_password: "{{ XWIKI_SUPERADMIN_PASSWORD }}"
    force_basic_auth: true
    status_code: [200, 201, 202, 204]
    headers: "{{ xwiki_rest_headers_write }}"
    body: "{{ lookup('template', 'roles/web-app-xwiki/templates/main_webhome_page.xml.j2') }}"
  when: _main_webhome_check.status == 404
