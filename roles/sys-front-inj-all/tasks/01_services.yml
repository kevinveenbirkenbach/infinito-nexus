# SPOT: central loader for all shared frontend web services.
# Iterates over all frontend entries from SERVICE_REGISTRY in group_vars/all/20_services.yml.
# Keep in mind to don't use inj_enabled.
#

- name: "Load frontend service (Once)"
  include_tasks: "_load_frontend_service.yml"
  vars:
    service_key: "{{ service_item.key }}"
    service_role: "{{ service_item.value.role }}"
    service_run_once_var: "{{ 'run_once_' ~ (service_item.value.role | replace('-', '_')) }}"
  when:
    - service_item.value.get('type') == 'frontend'
    - service_item.value.role is defined
    - application_id != service_item.value.role
    - lookup('service', service_item.key).needed | bool
    - lookup('vars', service_run_once_var, default='__missing__') == '__missing__'
  loop: "{{ SERVICE_REGISTRY | dict2items | list }}"
  loop_control:
    loop_var: service_item
    label: "{{ service_item.key }}"
