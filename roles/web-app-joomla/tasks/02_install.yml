# Wait until the Joomla core is copied into the volume
- name: "Wait for Joomla files to exist"
  command:
    argv: [ docker, exec, "{{ JOOMLA_CONTAINER }}", test, -f, /var/www/html/index.php ]
  register: joomla_files
  changed_when: false
  retries: 60
  delay: 2
  until: joomla_files.rc == 0

# (Optional) specifically wait for the CLI installer script
- name: "Check for CLI installer"
  command:
    argv: [ docker, exec, "{{ JOOMLA_CONTAINER }}", test, -f, "{{ JOOMLA_INSTALLER_CLI_FILE }}" ]
  register: has_installer
  changed_when: false
  failed_when: false

# Only if not already installed (no configuration.php)
- name: "Check if Joomla is already installed"
  command:
    argv: [ docker, exec, "{{ JOOMLA_CONTAINER }}", test, -f, "{{ JOOMLA_CONFIG_FILE }}" ]
  register: joomla_installed
  changed_when: false
  failed_when: false

# Install (uses absolute path + argv)
- name: "Joomla CLI install (first run only)"
  command:
    argv:
      - docker
      - exec
      - --user
      - "{{ JOOMLA_WEB_USER }}"
      - "{{ JOOMLA_CONTAINER }}"
      - php
      - "{{ JOOMLA_INSTALLER_CLI_FILE }}"
      - install
      - "--db-type={{ JOOMLA_DB_CONNECTOR }}"
      - "--db-host={{ lookup('database', application_id, 'host') }}"
      - "--db-user={{ lookup('database', application_id, 'username') }}"
      - "--db-pass={{ lookup('database', application_id, 'password') }}"
      - "--db-name={{ lookup('database', application_id, 'name') }}"
      - "--admin-user={{ JOOMLA_USER }}"
      - "--admin-username={{ JOOMLA_USER_NAME }}"
      - "--admin-password={{ JOOMLA_USER_PASSWORD }}"
      - "--admin-email={{ JOOMLA_USER_EMAIL }}"
      - "--no-interaction"
      - "--site-name={{ JOOMLA_SITE_NAME }}"
  register: j_install
  changed_when: j_install.rc == 0 or (j_install.stdout | default('') is search('Unable to delete installation folder'))
  # The CLI installer exits rc=0 when refusing to run on a raw git source tree,
  # which silently masks the failure and the next task then trips on a missing
  # configuration.php. Treat that refusal as a hard failure so we surface the
  # real cause (the image ships a raw git tree) instead of a misleading symptom.
  failed_when: >-
    (
      j_install.rc is defined and
      j_install.rc != 0 and
      not (j_install.stdout | default('') is search('Unable to delete installation folder'))
    )
    or (j_install.stdout | default('') is search('trying to run Joomla! from our git repository'))
  when:
    - joomla_installed.rc != 0
    - has_installer.rc == 0

# Joomla 5.x CLI installer intermittently fails to remove the installation folder
# (non-fatal — install itself completed). Force-remove as root to finish cleanup.
- name: "Force-remove installation folder (root)"
  command:
    argv: [ docker, exec, "{{ JOOMLA_CONTAINER }}", rm, -rf, /var/www/html/installation ]
  changed_when: false
  when:
    - joomla_installed.rc != 0
    - has_installer.rc == 0
