oidc:
  enabled: true
  shared: false
  # Modus 3 per requirement 013: when `fallback_enabled` is true, the
  # local Joomla form-login at `/administrator?fallback=local` is
  # available as an emergency hatch (recommended default). Set to
  # `false` for high-security deployments where the IdP is the only
  # admin path (Modus 1 effective).
  fallback_enabled: true
ldap:
  enabled: false
  shared: false
# Joomla 6 has no first-party OIDC adapter; this role ships its own
# `plg_system_keycloak` plugin (under `files/joomla-oidc-plugin/`) that
# implements native OIDC SSO against Keycloak with RBAC group mapping
# (Modus 3 per requirement 013: Force-Frontend, Local-Backup-Backend
# at `/administrator?fallback=local`, env-toggleable via
# `JOOMLA_OIDC_FALLBACK_ENABLED`). The LDAP variant uses Joomla's
# core LDAP authentication plugin.
oauth2:
  enabled: false
  shared: false
logout:
  enabled: true
  shared: true
dashboard:
  enabled: true
  shared: true
matomo:
  enabled: true
  shared: true
email:
  enabled: true
  shared: true
mariadb:
  enabled: true
  shared: true
joomla:
  image: joomla
  version: 6.1.0-php8.3-apache
  name: joomla
  min_storage: 8GB
  backup:
    no_stop_required: true
  upload:
    size_mb: 100
  autocreate_users: true
  ports:
    local:
      http: 8014
  run_after:
  - web-app-matomo
  - web-app-keycloak
  - web-app-mailu
  lifecycle: beta
css:
  enabled: true
  shared: true
prometheus:
  enabled: true
  shared: true
