oidc:
  enabled: false
  shared: false
ldap:
  enabled: false
  shared: false
# Joomla 6 ships no first-party OIDC adapter and the JED community
# plugins lag the Joomla 6 release. The integrated OIDC login path is
# therefore provided by a sidecar `web-app-oauth2-proxy` in front of
# the Joomla web UI per requirement 013's per-role notes (the marker
# is technically 🛠️ glue, not ✅ native). LDAP integration uses the
# same oauth2-proxy with an LDAP backend.
oauth2:
  enabled: true
  shared: false
  origin:
    host: joomla
    port: 80
  allowed_groups:
  - '{{ lookup(''rbac_group_path'', application_id=''web-app-joomla'', role=''administrator'') }}'
logout:
  enabled: true
  shared: true
dashboard:
  enabled: true
  shared: true
matomo:
  enabled: true
  shared: true
email:
  enabled: true
  shared: true
mariadb:
  enabled: true
  shared: true
joomla:
  image: joomla
  version: 6.1.0-php8.3-apache
  name: joomla
  min_storage: 8GB
  backup:
    no_stop_required: true
  upload:
    size_mb: 100
  autocreate_users: true
  ports:
    local:
      http: 8014
      oauth2: 16495
  run_after:
  - web-app-matomo
  - web-app-keycloak
  - web-app-mailu
  lifecycle: beta
css:
  enabled: true
  shared: true
prometheus:
  enabled: true
  shared: true
