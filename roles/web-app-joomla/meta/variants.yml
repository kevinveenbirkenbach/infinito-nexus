# Matrix-deploy variant overrides for this role (requirement 013
# alpha-to-beta promotion). Variant 0 is the canonical OIDC variant
# (default), where Joomla speaks OIDC natively via the `plg_system_keycloak`
# plugin shipped under `files/joomla-oidc-plugin/`. Variant 1 flips
# to the LDAP variant: OIDC is disabled and Joomla's core LDAP
# authentication plugin against `svc-db-openldap` is the exercised
# auth path.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# variant 0: OIDC variant (canonical default; native plg_system_keycloak).
- {}

# variant 1: LDAP variant. Disable OIDC, enable LDAP so the
# integrated LDAP login path through Joomla's admin form is the
# exercised auth path.
- services:
    oidc:
      enabled: false
    ldap:
      enabled: true
