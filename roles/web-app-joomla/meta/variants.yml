# Matrix-deploy variant overrides for this role (requirement 013
# alpha-to-beta promotion). Variant 0 is the canonical OIDC variant
# (default), where Joomla is gated by oauth2-proxy in front of the
# web UI. Variant 1 flips to the LDAP variant: oauth2-proxy is
# disabled and Joomla's local /administrator form login takes over.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# variant 0: OIDC variant (canonical default; oauth2-proxy in front).
- {}

# variant 1: LDAP variant. Disable oauth2-proxy and enable LDAP so the
# integrated LDAP login path through Joomla's admin form is the
# exercised auth path.
- services:
    oauth2:
      enabled: false
    ldap:
      enabled: true
