---
# nocheck: playwright-service-flag — self-provider; consumer indexing
# is verified by this role's own files/playwright/playwright.spec.js
css:
  enabled: true
  shared: true
  lifecycle: beta
# nocheck: playwright-service-flag — provider role; no consumer surface to gate
cdn:
  enabled: "{{ 'web-svc-cdn' in group_names }}"
  shared: "{{ 'web-svc-cdn' in group_names }}"
# nocheck: playwright-service-flag — provider role; no consumer surface to gate
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
