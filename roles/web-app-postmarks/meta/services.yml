oauth2:
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  origin:
    host: application
    port: 3000
  allowed_groups:
  - '{{ lookup(''rbac_group_path'', application_id=''web-app-postmarks'', role=''administrator'') }}'
# nocheck: dynamic-flag
logout:
  enabled: false
  shared: false
dashboard:
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
# nocheck: dynamic-flag
css:
  enabled: true
  shared: true
# noqa: email
# nocheck: dynamic-flag
email:
  enabled: false
  shared: false
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
application:
  image: node
  version: 20-bookworm
  name: web-app-postmarks
  repository: https://github.com/ckolderup/postmarks.git
  branch: main
postmarks:
  ports:
    local:
      http: 8075
      oauth2: 16494
  lifecycle: beta
