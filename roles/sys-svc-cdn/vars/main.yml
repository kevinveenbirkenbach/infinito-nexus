# CDN structure for the shared web-svc-cdn role (resolved once)
_cdn_shared: "{{ lookup('cdn', 'web-svc-cdn') }}"

# Global CDN dirs (shared subdirs + vendor) — used by run-once setup in tasks/main.yml
CDN_GLOBAL_DIRS:
  - "{{ _cdn_shared.shared.root }}"
  - "{{ _cdn_shared.shared.css }}"
  - "{{ _cdn_shared.shared.js }}"
  - "{{ _cdn_shared.shared.img }}"
  - "{{ _cdn_shared.shared.fonts }}"
  - "{{ _cdn_shared.vendor }}"

# Role-specific CDN dirs for the current application
CDN_ROLE_DIRS: "{{ lookup('cdn', application_id).role | cdn_dirs }}"
