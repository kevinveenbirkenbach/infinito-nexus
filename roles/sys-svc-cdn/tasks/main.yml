---
- block:
    - name: Ensure shared root and vendor exist (run once)
      ansible.builtin.file:
        path:  "{{ item }}"
        state: directory
        mode:  "0755"
      loop: "{{ CDN_GLOBAL_DIRS }}"
    - include_tasks: utils/once/flag.yml
  when:
    - run_once_sys_svc_cdn is not defined

- name: Overwritte CDN handlers with neutral handlers
  ansible.builtin.include_tasks: "tasks/utils/load_handlers.yml"
  loop:
  - svc-prx-openresty
  - sys-svc-compose
  loop_control:
    loop_var: handler_role
    label: "{{ handler_role }}"
  vars:
    handler_role_name: "{{ handler_role }}"

- name: Ensure CDN directories exist
  file:
    path:  "{{ item }}"
    state: directory
    mode:  "0755"
  loop: "{{ CDN_ROLE_DIRS }}"

- name: Ensure 'latest' symlink points to current release
  file:
    src:   "{{ lookup('cdn', application_id).role.release.root }}"
    dest:  "{{ [lookup('cdn', application_id).role.root, 'latest'] | path_join }}"
    state: link
    force: true
  when: lookup('cdn', application_id).role.version != 'latest'
