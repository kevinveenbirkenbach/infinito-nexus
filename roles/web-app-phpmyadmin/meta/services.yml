logout:
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
# nocheck: dynamic-flag
dashboard:
  enabled: false
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
mariadb:
  enabled: true  # nocheck: dynamic-flag
  shared: "{{ 'svc-db-mariadb' in group_names }}"
phpmyadmin:
  version: latest
  name: phpmyadmin
  image: phpmyadmin/phpmyadmin
  min_storage: 1GB
  autologin: false
  ports:
    local:
      oauth2: 16481
      http: 8034
  run_after:
  - web-app-matomo
  - web-app-keycloak
  lifecycle: beta
oauth2:
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  origin:
    port: '80'
    host: application
  allowed_groups:
  - '{{ lookup(''rbac_group_path'', application_id=''web-app-phpmyadmin'', role=''administrator'') }}'
# nocheck: dynamic-flag
css:
  enabled: false
  shared: true
# noqa: email
# nocheck: dynamic-flag
email:
  enabled: false
  shared: false
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
