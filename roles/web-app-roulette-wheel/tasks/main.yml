---
- name: "load docker, proxy for '{{ application_id }}'"
  include_role:
    name: sys-stk-full
  vars:
    docker_compose_flush_handlers: true
    docker_git_repository_address: "{{ ROULETTE_REPOSITORY }}"
    docker_git_repository_pull: true
    docker_git_repository_version: "{{ ROULETTE_REF }}"
