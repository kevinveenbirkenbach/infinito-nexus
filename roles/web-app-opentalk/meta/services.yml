oidc:
  enabled: true
  shared: true
  flavor: ''
ldap:
  enabled: true
  shared: true
logout:
  enabled: true
  shared: true
dashboard:
  enabled: true
  shared: true
matomo:
  enabled: true
  shared: true
email:
  enabled: true
  shared: true
coturn:
  enabled: true
  shared: true
postgres:
  enabled: true
  shared: true
# noqa: shared
redis:
  backup:
    disabled: true
  enabled: true
  cpus: '0.5'
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
opentalk:
  name: opentalk
  image: registry.opencode.de/opentalk/web-frontend
  version: v2.8.1
  min_storage: 4GB
  backup:
    no_stop_required: true
  cpus: '0.5'
  mem_reservation: 128m
  mem_limit: 512m
  pids_limit: 512
  ports:
    local:
      http: 8073
  run_after:
    - web-app-keycloak
    - web-app-opencloud
  lifecycle: alpha
controller:
  name: opentalk-controller
  image: registry.opencode.de/opentalk/controller
  version: v0.33.2
  min_storage: 8GB
  backup:
    no_stop_required: true
  cpus: '1.5'
  mem_reservation: 512m
  mem_limit: 2g
  pids_limit: 1024
  ports:
    local:
      http: 8072
livekit:
  name: opentalk-livekit
  image: livekit/livekit-server
  version: v1.9.12
  cpus: '2.0'
  mem_reservation: 512m
  mem_limit: 2g
  pids_limit: 1024
  # LiveKit runs in host network mode for media UDP. Only the relay
  # port range is exposed for firewall planning; the HTTP/TCP control
  # ports (7880/7881) live on the host directly.
  ports:
    public:
      relay:
        start: 60000
        end: 60999
minio:
  name: opentalk-minio
  image: minio/minio
  version: latest
  cpus: '0.5'
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
css:
  enabled: false
  shared: true
prometheus:
  enabled: true
  shared: true
