domains:
  canonical:
    - talk.{{ DOMAIN_PRIMARY }}
  aliases: []
csp:
  flags:
    style-src-attr:
      unsafe-inline: true
    script-src-elem:
      unsafe-inline: true
    script-src-attr:
      unsafe-inline: true
  whitelist:
    connect-src:
      - open.cloud.{{ DOMAIN_PRIMARY }}
      - 'wss:'
    media-src:
      - 'blob:'
      - '*'
    worker-src:
      - 'blob:'
networks:
  local:
    subnet: 192.168.105.64/28
