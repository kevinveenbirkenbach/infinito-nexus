credentials:
  database_password:
    description: Postgres password used by the OpenTalk controller for its dedicated database.
    algorithm: alphanumeric
    validation:
      min_length: 24
  livekit_api_secret:
    description: Shared secret between OpenTalk controller and the LiveKit media server.
    algorithm: alphanumeric
    validation:
      min_length: 32
  controller_oidc_client_secret:
    description: Client secret for the dedicated confidential Keycloak client (`opentalk-controller`) the controller uses to introspect access tokens.
    algorithm: alphanumeric
    validation:
      min_length: 32
  recorder_oidc_client_secret:
    description: Client secret for the dedicated confidential Keycloak client (`opentalk-recorder`) the recorder uses to authenticate against the controller.
    algorithm: alphanumeric
    validation:
      min_length: 32
  minio_root_user:
    description: MinIO root username used by the embedded asset/recording bucket.
    algorithm: alphanumeric
    validation:
      min_length: 8
  minio_root_password:
    description: MinIO root password used by the embedded asset/recording bucket.
    algorithm: alphanumeric
    validation:
      min_length: 16
