---
- name: "load docker, db and proxy for {{ application_id }}"
  include_role:
    name: sys-stk-full
  vars:
    docker_compose_flush_handlers: false

- name: "Render OpenTalk controller config '{{ application_id }}'"
  ansible.builtin.template:
    src: controller.toml.j2
    dest: "{{ [lookup('container', application_id, 'directories.volumes'), 'controller.toml'] | path_join }}"
    mode: '0644'
  notify:
    - compose up

- name: "Render LiveKit config '{{ application_id }}'"
  ansible.builtin.template:
    src: livekit.yaml.j2
    dest: "{{ [lookup('container', application_id, 'directories.volumes'), 'livekit.yaml'] | path_join }}"
    mode: '0644'
  notify:
    - compose up

- name: "Render OpenTalk recorder config '{{ application_id }}'"
  ansible.builtin.template:
    src: recorder.toml.j2
    dest: "{{ [lookup('container', application_id, 'directories.volumes'), 'recorder.toml'] | path_join }}"
    mode: '0644'
  notify:
    - compose up

- name: "Flush handlers for '{{ application_id }}' so compose up sees rendered configs"
  meta: flush_handlers

# The shared `infinito.nexus` realm client is public, so it cannot
# introspect access tokens. Provision a dedicated confidential client
# (`opentalk-controller`) with a service account that can call the
# Keycloak admin API and the OIDC introspection endpoint.
- name: "Authenticate kcadm against the master realm (for OpenTalk client provisioning)"
  ansible.builtin.shell: |-
    {{ KEYCLOAK_EXEC_CONTAINER }} sh -lc '
      set -e
      {{ KEYCLOAK_KCADM }} config credentials \
        --server {{ KEYCLOAK_SERVER_INTERNAL_URL }} \
        --realm master \
        --user "$KEYCLOAK_PERMANENT_ADMIN_USERNAME" \
        --password "$KEYCLOAK_PERMANENT_ADMIN_PASSWORD"
    '
  vars:
    KEYCLOAK_EXEC_CONTAINER: "container exec -i {{ lookup('config', 'web-app-keycloak', 'services.keycloak.name') }}"
    KEYCLOAK_KCADM: "/opt/keycloak/bin/kcadm.sh"
    KEYCLOAK_SERVER_INTERNAL_URL: "http://127.0.0.1:8080"
  changed_when: false
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Upsert dedicated confidential Keycloak client for the OpenTalk controller"
  keycloak_kcadm_update:
    object_kind: "client"
    lookup_value: "{{ OPENTALK_CTRL_OIDC_CLIENT_ID }}"
    desired:
      clientId: "{{ OPENTALK_CTRL_OIDC_CLIENT_ID }}"
      name: "OpenTalk Controller"
      description: "Confidential client used by web-app-opentalk for token introspection and Keycloak admin API user search."
      enabled: true
      protocol: "openid-connect"
      publicClient: false
      bearerOnly: false
      standardFlowEnabled: false
      implicitFlowEnabled: false
      directAccessGrantsEnabled: false
      serviceAccountsEnabled: true
      clientAuthenticatorType: "client-secret"
      secret: "{{ OPENTALK_CTRL_OIDC_CLIENT_SECRET }}"
      attributes:
        "client.secret.creation.time": "0"
        "oauth2.device.authorization.grant.enabled": "false"
        "use.refresh.tokens": "true"
    force_attrs:
      publicClient: false
      serviceAccountsEnabled: true
      secret: "{{ OPENTALK_CTRL_OIDC_CLIENT_SECRET }}"
    kcadm_exec: "container exec -i {{ lookup('config', 'web-app-keycloak', 'services.keycloak.name') }} /opt/keycloak/bin/kcadm.sh"
    realm: "{{ OIDC.CLIENT.REALM }}"
    assert_mode: "{{ MODE_ASSERT | default(false) }}"
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Upsert dedicated confidential Keycloak client for the OpenTalk recorder"
  keycloak_kcadm_update:
    object_kind: "client"
    lookup_value: "{{ OPENTALK_RECORDER_OIDC_CLIENT_ID }}"
    desired:
      clientId: "{{ OPENTALK_RECORDER_OIDC_CLIENT_ID }}"
      name: "OpenTalk Recorder"
      description: "Confidential service-account client used by the OpenTalk recorder to authenticate against the controller."
      enabled: true
      protocol: "openid-connect"
      publicClient: false
      bearerOnly: false
      standardFlowEnabled: false
      implicitFlowEnabled: false
      directAccessGrantsEnabled: false
      serviceAccountsEnabled: true
      clientAuthenticatorType: "client-secret"
      secret: "{{ OPENTALK_RECORDER_OIDC_CLIENT_SECRET }}"
      attributes:
        "client.secret.creation.time": "0"
        "oauth2.device.authorization.grant.enabled": "false"
        "use.refresh.tokens": "true"
    force_attrs:
      publicClient: false
      serviceAccountsEnabled: true
      secret: "{{ OPENTALK_RECORDER_OIDC_CLIENT_SECRET }}"
    kcadm_exec: "container exec -i {{ lookup('config', 'web-app-keycloak', 'services.keycloak.name') }} /opt/keycloak/bin/kcadm.sh"
    realm: "{{ OIDC.CLIENT.REALM }}"
    assert_mode: "{{ MODE_ASSERT | default(false) }}"
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Grant the OpenTalk controller's service account the realm-management `view-users` role"
  ansible.builtin.shell: |-
    {{ KCEXEC }} sh -lc '
      set -e
      KCADM={{ KEYCLOAK_KCADM }}
      REALM={{ OIDC.CLIENT.REALM | quote }}
      CLIENT_ID={{ OPENTALK_CTRL_OIDC_CLIENT_ID | quote }}

      # Resolve the service-account user for the controller client.
      SA_USER_ID=$($KCADM get clients/$($KCADM get clients -r $REALM -q clientId=$CLIENT_ID --fields id --format csv --noquotes | tail -n1)/service-account-user -r $REALM --fields id --format csv --noquotes | tail -n1)

      # Resolve the realm-management client id and the view-users role payload.
      RM_CLIENT_ID=$($KCADM get clients -r $REALM -q clientId=realm-management --fields id --format csv --noquotes | tail -n1)
      $KCADM add-roles -r $REALM --uusername service-account-$CLIENT_ID --cclientid realm-management --rolename view-users --rolename query-users || true
    '
  vars:
    KCEXEC: "container exec -i {{ lookup('config', 'web-app-keycloak', 'services.keycloak.name') }}"
    KEYCLOAK_KCADM: "/opt/keycloak/bin/kcadm.sh"
  changed_when: false
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Restart the OpenTalk controller so it picks up the refreshed introspection client"
  ansible.builtin.command: "container restart {{ OPENTALK_CTRL_CONTAINER }}"
  changed_when: true

- name: "Wait for MinIO to accept the configured root credentials"
  ansible.builtin.shell: >
    container exec {{ OPENTALK_MINIO_CONTAINER }}
    mc alias set local http://127.0.0.1:9000
    {{ OPENTALK_MINIO_USER | quote }}
    {{ OPENTALK_MINIO_PASSWORD | quote }}
  register: minio_ready
  retries: 60
  delay: 3
  until: minio_ready.rc == 0
  changed_when: false
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Ensure OpenTalk MinIO bucket exists"
  ansible.builtin.shell: >
    container exec {{ OPENTALK_MINIO_CONTAINER }}
    mc mb local/{{ OPENTALK_MINIO_BUCKET }}
  register: minio_bucket
  changed_when: "'Bucket created successfully' in (minio_bucket.stdout | default(''))"
  failed_when: minio_bucket.rc != 0 and 'already own it' not in (minio_bucket.stderr | default(''))
