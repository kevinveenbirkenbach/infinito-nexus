# nocheck: dynamic-flag
# nocheck: logout
logout:
  enabled: false
  shared: false
# nocheck: dynamic-flag
# nocheck: oidc
oidc:
  enabled: false
  shared: false
# nocheck: dynamic-flag
# nocheck: oauth2
oauth2:
  enabled: false
  shared: false
dashboard:
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
sphinx:
  image: ghcr.io/kevinveenbirkenbach/infinito-sphinx
  version: latest
  min_storage: 1GB
  backup:
    no_stop_required: true
  name: sphinx
  ports:
    inter: 8000
    local:
      http: 8036
  run_after:
    - web-app-matomo
  lifecycle: beta
  cpus: '0.2'
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
# nocheck: dynamic-flag
css:
  enabled: true
  shared: true
# nocheck: email
# nocheck: dynamic-flag
email:
  enabled: false
  shared: false
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
