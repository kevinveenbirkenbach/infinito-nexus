# run_once_sys_stk_backend: disabled

- name: "Resolve backend context for '{{ application_id }}'"
  ansible.builtin.set_fact:
    _sys_stk_backend_database_consumer_id: >-
      {{ database_consumer_id | default(application_id) }}
    _sys_stk_backend_database_enabled: >-
      {{ lookup('database', application_id, 'enabled') | bool }}
    _sys_stk_backend_oauth2_enabled: >-
      {{ lookup('config', application_id, 'services.oauth2.enabled', False) }}
  changed_when: false

- name: "DEBUG | SYS-STK-BACKEND | Application context"
  ansible.builtin.debug:
    msg:
      - "application_id={{ application_id }}"
      - "database_consumer_id={{ _sys_stk_backend_database_consumer_id }}"
      - "database_enabled={{ _sys_stk_backend_database_enabled }}"
      - "oauth2_enabled={{ _sys_stk_backend_oauth2_enabled }}"
  when: MODE_DEBUG | bool

- name: "For '{{ application_id }}': Load central RDBMS"
  include_role:
    name: sys-svc-rdbms
    public: false
  vars:
    database_consumer_id: "{{ _sys_stk_backend_database_consumer_id }}"
  when: _sys_stk_backend_database_enabled | bool

- name: "For '{{ application_id }}': Load sys-svc-compose"
  include_role:
    name: sys-svc-compose
  vars:
    docker_compose_flush_handlers:  false
    database_consumer_id:           "{{ _sys_stk_backend_database_consumer_id }}"

- block:
    - name: "set oauth2_proxy_application_id (Needed due to lazzy loading issue)"
      set_fact:
        oauth2_proxy_application_id: "{{ application_id }}"
    - name: "load role web-app-oauth2-proxy"
      include_tasks: "{{ playbook_dir }}/roles/web-app-oauth2-proxy/tasks/main.yml"
  when: _sys_stk_backend_oauth2_enabled | bool

- name: "flush compose and oauth2 proxy'"
  meta: flush_handlers
  when: docker_compose_flush_handlers | bool
