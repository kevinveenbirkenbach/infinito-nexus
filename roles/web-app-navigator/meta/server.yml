csp:
  whitelist:
    script-src-elem:
    - https://cdnjs.cloudflare.com
    - https://code.jquery.com
    - https://cdn.jsdelivr.net
    style-src-elem:
    - https://cdnjs.cloudflare.com
    - https://cdn.jsdelivr.net
    font-src:
    - https://cdnjs.cloudflare.com
    frame-src:
    - '*.{{ DOMAIN_PRIMARY }}'
  flags:
    style-src-attr:
      unsafe-inline: true
    script-src-attr:
      unsafe-eval: true
    script-src-elem:
      unsafe-inline: true
domains:
  canonical:
  - slides.{{ DOMAIN_PRIMARY }}
  aliases: []
networks:
  local:
    subnet: 192.168.103.48/28
