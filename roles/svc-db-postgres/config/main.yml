compose:
  services:
    postgres:
      enabled:            false
      shared:             true
      # Postgis is necessary for mobilizon
      image:              postgis/postgis
      name:               postgres
      # Please set an version in your inventory file! 
      # Rolling release isn't recommended
      version:            "17-3.5"
      min_storage:        "10GB"
      backup:
        database_routine: true
      cpus:               "2.0"
      mem_reservation:    "4g"
      mem_limit:          "6g"
      pids_limit:         1024
  volumes:
    data:   "postgres_data"
  network:  "postgres"
