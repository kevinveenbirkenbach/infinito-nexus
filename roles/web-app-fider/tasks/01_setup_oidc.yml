---
- name: "Fider | Check if tenant is already initialized"
  database_query:
    config: "{{ lookup('database', application_id) }}"
    query_file: "{{ role_path }}/files/sql/count-tenants.sql"
    expect_rows: true
    mask_values: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  register: fider_tenant_count
  changed_when: false

- name: "Fider | Bootstrap initial tenant via API"
  uri_retry:
    url: "http://{{ DOCKER_REACH_HOST }}:{{ lookup('config', application_id, 'services.fider.ports.local.http') }}/_api/tenants"
    method: POST
    body_format: json
    body:
      tenantName: "{{ SOFTWARE_NAME }}"
      subdomain: "fider"
      name: "{{ lookup('users', 'administrator').firstname }} {{ lookup('users', 'administrator').lastname }}"
      email: "{{ lookup('users', 'administrator').email }}"
      legalAgreement: true
      token: ""
    status_code: [200, 201]
  when: (fider_tenant_count.rows[0][0] | int) == 0

- name: "Fider | Create admin user (bypass email verification)"
  database_query:
    config: "{{ lookup('database', application_id) }}"
    query_file: "{{ role_path }}/files/sql/create-admin-user.sql"
    named_args:
      full_name: "{{ lookup('users', 'administrator').firstname }} {{ lookup('users', 'administrator').lastname }}"
      email: "{{ lookup('users', 'administrator').email }}"
    mask_values: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  changed_when: true

- name: "Fider | Activate tenant (set status=1 to bypass email confirmation)"
  database_query:
    config: "{{ lookup('database', application_id) }}"
    query_file: "{{ role_path }}/files/sql/activate-tenants.sql"
    mask_values: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  changed_when: true

- name: "Fider | Configure Keycloak as OIDC provider in database"
  database_query:
    config: "{{ lookup('database', application_id) }}"
    query_file: "{{ role_path }}/files/sql/configure-oidc-provider.sql"
    named_args:
      display_name: "{{ SOFTWARE_NAME }} SSO"
      client_id: "{{ OIDC.CLIENT.ID }}"
      client_secret: "{{ OIDC.CLIENT.SECRET }}"
      authorize_url: "{{ OIDC.CLIENT.AUTHORIZE_URL }}"
      token_url: "{{ OIDC.CLIENT.TOKEN_URL }}"
      profile_url: "{{ OIDC.CLIENT.USER_INFO_URL }}"
    mask_values: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  changed_when: true
