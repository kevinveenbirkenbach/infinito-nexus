oidc:
  enabled: true
  shared: true
email:
  enabled: true
  shared: true
logout:
  enabled: true
  shared: true
dashboard:
  enabled: true
  shared: true
matomo:
  enabled: true
  shared: true
postgres:
  enabled: true
  shared: true
fider:
  image: getfider/fider
  version: stable
  name: fider
  container_port: 3000
  min_storage: 1GB
  backup:
    no_stop_required: true
  cpus: '0.5'
  mem_reservation: 128m
  mem_limit: 512m
  pids_limit: 256
  ports:
    local:
      http: 8067
  run_after:
  - web-app-keycloak
  - web-app-mailu
  lifecycle: beta
oauth2:
  enabled: false
redis:
  backup:
    disabled: true
  enabled: false
css:
  enabled: true
  shared: true
javascript:
  enabled: false
prometheus:
  enabled: true
  shared: true
