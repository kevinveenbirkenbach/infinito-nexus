# nocheck: dynamic-flag
oauth2:
  enabled: false
# nocheck: dynamic-flag
dashboard:
  enabled: false
  shared: false
# nocheck: dynamic-flag
matomo:
  enabled: false
  shared: false
# nocheck: dynamic-flag
redis:
  backup:
    disabled: true
  enabled: false
# nocheck: dynamic-flag
css:
  enabled: false
  shared: false
# nocheck: dynamic-flag
recaptcha:
  enabled: false
simpleicons:
  enabled: "{{ 'web-svc-simpleicons' in group_names }}"
  shared: "{{ 'web-svc-simpleicons' in group_names }}"
  image: node
  version: latest
  min_storage: 1GB
  cpus: 0.5
  mem_reservation: 126m
  mem_limit: 265m
  pids_limit: 126
  ports:
    local:
      http: 8044
  lifecycle: beta
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
