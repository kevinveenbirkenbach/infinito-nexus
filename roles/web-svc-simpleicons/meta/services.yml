---
# nocheck: dynamic-flag
oauth2:
  enabled: false
# nocheck: dynamic-flag
dashboard:
  enabled: false
  shared: false
# nocheck: dynamic-flag
matomo:
  enabled: false
  shared: false
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
redis:
  backup:
    disabled: true
  enabled: false
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — canonical:cdn alias of static-asset provider
css:
  enabled: false
  shared: false
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — captcha backend, infrastructural
recaptcha:
  enabled: false
# nocheck: playwright-service-flag — self-provider
simpleicons:
  enabled: true
  shared: true
  image: node
  version: latest
  min_storage: 1GB
  cpus: 0.5
  mem_reservation: 126m
  mem_limit: 265m
  pids_limit: 126
  ports:
    local:
      http: 8044
  lifecycle: beta
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — local build tag for the application container
application:
  image: simpleicons-server
  version: latest
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
