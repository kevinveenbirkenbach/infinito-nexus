- name: Wait for a known Simple Icons asset before rebuilding dashboard cards
  uri_retry:
    url: "{{ DASHBOARD_SIMPLEICONS_SYNC_URL_BASE }}keycloak.svg"
    status_code: 200
    validate_certs: false
  register: simpleicons_http
  retries: 60
  delay: 5
  until: simpleicons_http.status == 200

- name: Reload docker cards once Simple Icons is reachable
  set_fact:
    portfolio_cards: "{{ portfolio_cards | add_simpleicon_source(DASHBOARD_SIMPLEICONS_SYNC_URL_BASE) }}"
  changed_when: false

- name: Regroup docker cards after Simple Icons refresh
  set_fact:
    portfolio_menu_data: "{{ lookup('docker_cards_grouped', portfolio_cards, portfolio_menu_categories) }}"

- name: Download dashboard Simple Icons into local static directory
  get_url_retry:
    url: "{{ DASHBOARD_SIMPLEICONS_SYNC_URL_BASE }}{{ item.icon.source | basename }}"
    dest: "{{ [DASHBOARD_SIMPLEICONS_STATIC_DIR_HOST, (item.icon.source | basename)] | path_join }}"
    mode: '0644'
    validate_certs: false
  loop: "{{ portfolio_cards }}"
  loop_control:
    label: "{{ item.title }}"
  when:
    - item.icon is defined
    - item.icon.source is defined
    - item.icon.source is match('^' ~ DASHBOARD_SIMPLEICONS_STATIC_SUBDIR ~ '/[^/]+\\.svg$')

- name: Refresh host-specific config.yaml after Simple Icons is reachable
  template:
    src: "{{ DASHBOARD_CONFIG_INV_PATH }}"
    dest: "{{ DASHBOARD_CONFIG_YML_DEST }}"
  notify: compose up
  when: config_file.stat.exists

- name: Refresh default config.yaml after Simple Icons is reachable
  template:
    src: "{{ DASHBOARD_CONFIG_YML_SRC_FILE }}"
    dest: "{{ DASHBOARD_CONFIG_YML_DEST }}"
  notify: compose up
  when: not config_file.stat.exists

- name: Flush compose handlers after Simple Icons refresh
  meta: flush_handlers
