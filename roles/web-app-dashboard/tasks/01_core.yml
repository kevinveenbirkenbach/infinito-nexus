- name: "Validate configuration"
  include_tasks: "02_validate.yml"
  when: MODE_ASSERT | bool

- name: "Include JS routines"
  include_tasks: "03_javascript.yml"

- name: "load docker, proxy for '{{ application_id }}'"
  include_role:
    name: sys-stk-full
  vars:
    docker_compose_flush_handlers: false
    docker_git_repository_pull: false

- name: "Check if host-specific config.yaml exists in {{ DASHBOARD_CONFIG_INV_PATH }}"
  stat:
    path: "{{ DASHBOARD_CONFIG_INV_PATH }}"
  delegate_to: localhost
  become: false
  register: config_file

- name: Load menu categories
  include_vars:
    file: "menu_categories.yml"

- name: Load docker cards
  set_fact:
    portfolio_cards: "{{ lookup('docker_cards', 'roles') }}"

- name: "Load Dashboard Brand logos"
  set_fact:
    portfolio_cards: "{{ portfolio_cards | add_simpleicon_source(lookup('tls', 'web-svc-simpleicons', 'url.base')) }}"
  when: DASHBOARD_SIMPLEICONS_ENABLED | bool
  changed_when: false

- name: Group docker cards
  set_fact:
    portfolio_menu_data: "{{ lookup('docker_cards_grouped', portfolio_cards, portfolio_menu_categories) }}"

- name: Copy host-specific config.yaml if it exists
  template:
    src: "{{ DASHBOARD_CONFIG_INV_PATH }}"
    dest: "{{ DASHBOARD_CONFIG_YML_DEST }}"
  notify: compose up
  when: config_file.stat.exists

- name: Copy default config.yaml from the role template if host-specific file does not exist
  template:
    src: "{{ DASHBOARD_CONFIG_YML_SRC_FILE }}"
    dest: "{{ DASHBOARD_CONFIG_YML_DEST }}"
  notify: compose up
  when: not config_file.stat.exists

- name: "Flush compose handlers"
  meta: flush_handlers

- name: Wait for a known Simple Icons asset before rebuilding dashboard cards
  uri_retry:
    url: "{{ lookup('tls', 'web-svc-simpleicons', 'url.base') }}keycloak.svg"
    status_code: 200
    validate_certs: false
  register: simpleicons_http
  retries: 60
  delay: 5
  until: simpleicons_http.status == 200
  when: DASHBOARD_SIMPLEICONS_ENABLED | bool

- name: Reload docker cards once Simple Icons is reachable
  set_fact:
    portfolio_cards: "{{ lookup('docker_cards', 'roles') | add_simpleicon_source(lookup('tls', 'web-svc-simpleicons', 'url.base')) }}"
  when: DASHBOARD_SIMPLEICONS_ENABLED | bool
  changed_when: false

- name: Regroup docker cards after Simple Icons refresh
  set_fact:
    portfolio_menu_data: "{{ lookup('docker_cards_grouped', portfolio_cards, portfolio_menu_categories) }}"
  when: DASHBOARD_SIMPLEICONS_ENABLED | bool

- name: Refresh host-specific config.yaml after Simple Icons is reachable
  template:
    src: "{{ DASHBOARD_CONFIG_INV_PATH }}"
    dest: "{{ DASHBOARD_CONFIG_YML_DEST }}"
  notify: compose up
  when:
    - DASHBOARD_SIMPLEICONS_ENABLED | bool
    - config_file.stat.exists

- name: Refresh default config.yaml after Simple Icons is reachable
  template:
    src: "{{ DASHBOARD_CONFIG_YML_SRC_FILE }}"
    dest: "{{ DASHBOARD_CONFIG_YML_DEST }}"
  notify: compose up
  when:
    - DASHBOARD_SIMPLEICONS_ENABLED | bool
    - not config_file.stat.exists

- name: Flush compose handlers after Simple Icons refresh
  meta: flush_handlers
  when: DASHBOARD_SIMPLEICONS_ENABLED | bool

- name: Wait for Dashboard HTTP endpoint (required so all logos can be downloaded during initialization)
  uri_retry:
    url: "http://{{ DOCKER_REACH_HOST }}:{{ http_port }}/"
    status_code: 200
  register: dashboard_http
  retries: 60
  delay: 5
  until: dashboard_http.status == 200

- include_tasks: utils/once/flag.yml
