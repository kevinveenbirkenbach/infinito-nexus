---
oidc:
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
# nocheck: playwright-service-flag — static-asset provider, no Playwright surface
asset:
  enabled: "{{ 'web-svc-asset' in group_names }}"
  shared: "{{ 'web-svc-asset' in group_names }}"
cdn:
  enabled: "{{ 'web-svc-cdn' in group_names }}"
  shared: "{{ 'web-svc-cdn' in group_names }}"
simpleicons:
  enabled: "{{ 'web-svc-simpleicons' in group_names }}"
  shared: "{{ 'web-svc-simpleicons' in group_names }}"
logout:
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
# nocheck: playwright-service-flag — self-provider
dashboard:
  enabled: true
  shared: true
  name: dashboard
  image: ghcr.io/kevinveenbirkenbach/port-ui
  version: 1.1.0
  min_storage: 1GB
  cpus: "0.3"
  mem_reservation: 256m
  mem_limit: 512m
  pids_limit: 256
  ports:
    local:
      http: 8029
  run_after:
    - web-app-matomo
  lifecycle: beta
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — canonical:cdn alias of static-asset provider
css:
  enabled: true
  shared: true
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — canonical:cdn alias of static-asset provider
javascript:
  enabled: true
  shared: true
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
