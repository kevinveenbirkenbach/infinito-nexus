csp:
  whitelist:
    script-src-elem:
    - https://cdn.jsdelivr.net
    - https://kit.fontawesome.com
    - https://code.jquery.com/
    style-src-elem:
    - https://cdn.jsdelivr.net
    - https://kit.fontawesome.com
    - https://code.jquery.com/
    font-src:
    - https://ka-f.fontawesome.com
    - https://cdn.jsdelivr.net
    connect-src:
    - https://ka-f.fontawesome.com
    - https://cdn.jsdelivr.net
    - auth.{{ DOMAIN_PRIMARY }}
    frame-src:
    - '*.{{ DOMAIN_PRIMARY }}'
  flags:
    script-src-attr:
      unsafe-inline: true
domains:
  canonical:
  - dashboard.{{ DOMAIN_PRIMARY }}
  aliases: []
networks:
  local:
    subnet: 192.168.104.192/28
