oidc:
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
ldap:
  enabled: false  # nocheck: dynamic-flag
  shared: "{{ 'svc-db-openldap' in group_names }}"
# nocheck: dynamic-flag
oauth2:
  enabled: false
  origin:
    host: gateway
    port: '80'
logout:
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
postgres:
  enabled: true  # nocheck: dynamic-flag
  shared: "{{ 'svc-db-postgres' in group_names }}"
taiga:
  version: latest
  min_storage: 10GB
  cpus: '1.0'
  mem_reservation: 1g
  mem_limit: 1.5g
  pids_limit: 512
  ports:
    local:
      oauth2: 16491
      http: 8027
  run_after:
  - web-app-matomo
  - web-app-keycloak
  lifecycle: beta
async:
  cpus: '1.0'
  mem_reservation: 1g
  mem_limit: 1.5g
  pids_limit: 512
front:
  cpus: '0.3'
  mem_reservation: 256m
  mem_limit: 512m
  pids_limit: 256
gateway:
  cpus: '0.3'
  mem_reservation: 256m
  mem_limit: 512m
  pids_limit: 256
events:
  cpus: '0.3'
  mem_reservation: 256m
  mem_limit: 512m
  pids_limit: 256
async-rabbitmq:
  cpus: '1.0'
  mem_reservation: 1g
  mem_limit: 1.5g
  pids_limit: 512
events-rabbitmq:
  cpus: '0.5'
  mem_reservation: 512m
  mem_limit: 1g
  pids_limit: 512
manager:
  cpus: '0.5'
  mem_reservation: 512m
  mem_limit: 1g
  pids_limit: 256
protected:
  cpus: '0.2'
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 128
# nocheck: dynamic-flag
css:
  enabled: true
  shared: true
# nocheck: dynamic-flag
javascript:
  enabled: true
  shared: true
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
