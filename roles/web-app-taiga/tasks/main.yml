---
- name: "load docker, db and proxy for {{ application_id }}"
  include_role:
    name: sys-stk-full
  vars:
    docker_compose_flush_handlers:  false
    docker_git_repository_address:  "https://github.com/taigaio/taiga-docker"
    docker_git_repository_pull:     true

- name: "copy taiga gateway config with OIDC route"
  template:
    src:  "taiga-gateway/taiga.conf.j2"
    dest: "{{ [docker_repository_path, 'taiga-gateway', 'taiga.conf'] | path_join }}"
  when:   TAIGA_OIDC_ENABLED | bool
  notify: compose up

- name: "render Dockerfile.taiga-back for custom auth-enabled backend image"
  template:
    src:  "Dockerfile.back.j2"
    dest: "{{ [docker_repository_path, 'Dockerfile.taiga-back'] | path_join }}"
  when:   TAIGA_PLUGINS_ENABLED | bool
  notify: compose up

- name: "render Dockerfile.taiga-front for custom OIDC frontend image"
  template:
    src:  "Dockerfile.front.j2"
    dest: "{{ [docker_repository_path, 'Dockerfile.taiga-front'] | path_join }}"
  when:   TAIGA_OIDC_ENABLED | bool
  notify: compose up

- name: "copy taiga config.append.py (OIDC and/or LDAP settings appended to config.py at runtime)"
  template:
    src:  "settings/config.append.py.j2"
    dest: "{{ TAIGA_CONFIG_APPEND_PATH }}"
  when:   TAIGA_PLUGINS_ENABLED | bool
  notify: compose up

- name: "copy taiga urls.py (OIDC URL routing)"
  template:
    src:  "settings/urls.py.j2"
    dest: "{{ TAIGA_URLS_PATH }}"
  when:   TAIGA_OIDC_ENABLED | bool
  notify: compose up

- name: "copy taiga frontend conf.json (loginFormType / contribPlugins)"
  template:
    src:  "settings/conf.json.j2"
    dest: "{{ TAIGA_FRONTEND_CONF_PATH }}"
  when:   TAIGA_PLUGINS_ENABLED | bool
  notify: compose up

- name: "create {{ TAIGA_COMPOSE_INIT_PATH }}"
  template:
    src:  "compose-inits.yml.j2"
    dest:  "{{ TAIGA_COMPOSE_INIT_PATH }}"
  notify: compose up

- name: "Include Taiga administrator routines"
  include_tasks: 01_administrator.yml

- name: "Flush Taiga handlers"
  meta: flush_handlers
