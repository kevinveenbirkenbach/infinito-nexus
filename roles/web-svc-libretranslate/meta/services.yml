---
libretranslate:
  enabled: true
  shared: true
  image: libretranslate/libretranslate
  version: latest
  min_storage: 5GB
  ports:
    local:
      http: 8045
      oauth2: 16493
  lifecycle: beta
  cpus: "0.2"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
oauth2:
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  origin:
    host: libretranslate
    port: 5000
  acl:
    whitelist:
      - /translate
      - /detect
      - /languages
      - /spec
      - /frontend/settings
      - /api
  allowed_groups:
    - "{{ lookup('rbac_group_path', application_id='web-svc-libretranslate', role='administrator') }}"
# nocheck: dynamic-flag
logout:
  enabled: false
  shared: false
dashboard:
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
# nocheck: dynamic-flag
redis:
  backup:
    disabled: true
  enabled: false
# nocheck: dynamic-flag
css:
  enabled: true
  shared: true
# nocheck: dynamic-flag
recaptcha:
  enabled: false
# nocheck: dynamic-flag
javascript:
  enabled: false
  shared: true
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
