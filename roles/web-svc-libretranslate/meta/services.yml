libretranslate:
  enabled: true
  shared: true
  image: libretranslate/libretranslate
  version: latest
  min_storage: 5GB
  ports:
    local:
      http: 8045
      oauth2: 16493
  lifecycle: beta
  cpus: '0.2'
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
oauth2:
  enabled: true
  shared: false
  origin:
    host: libretranslate
    port: 5000
  # Per requirement 013 LibreTranslate's OIDC integration MUST gate
  # the human-facing web UI but MUST NOT gate the programmatic API
  # endpoints; the latter authenticate machine clients via API keys.
  # Whitelist the canonical LibreTranslate API surfaces so API-key
  # callers keep working when SSO is enabled on the UI.
  acl:
    whitelist:
      - /translate
      - /detect
      - /languages
      - /spec
      - /frontend/settings
      - /api
  allowed_groups:
  - '{{ lookup(''rbac_group_path'', application_id=''web-svc-libretranslate'', role=''administrator'') }}'
logout:
  enabled: false
  shared: false
dashboard:
  enabled: true
  shared: true
matomo:
  enabled: true
  shared: true
redis:
  backup:
    disabled: true
  enabled: false
css:
  enabled: true
  shared: true
recaptcha:
  enabled: false
javascript:
  enabled: false
  shared: true
prometheus:
  enabled: true
  shared: true
