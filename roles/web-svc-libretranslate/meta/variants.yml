---
# Matrix-deploy variant overrides for web-svc-libretranslate.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# variant pinning every dynamic services.yml flag to true so the
# matrix exercises the in-group_names branch of web-svc-libretranslate.

- services:
    matomo:
      enabled: true
      shared: true
    oauth2:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true
- services:
    matomo:
      enabled: false
      shared: false
    oauth2:
      enabled: false
      shared: false
    prometheus:
      enabled: false
      shared: false
