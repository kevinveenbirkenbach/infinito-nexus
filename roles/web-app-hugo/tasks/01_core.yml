- name: "Assert exactly one canonical domain (V1 single-site scope)"
  ansible.builtin.assert:
    that:
      - lookup('config', application_id, 'server.domains.canonical') | length == 1
    fail_msg: >-
      web-app-hugo V1 supports exactly one canonical domain. Configure
      a single entry under `server.domains.canonical` for this role.
      Multi-canonical-domain support is deferred to a follow-up
      requirement.

- name: "load docker, proxy for '{{ application_id }}'"
  include_role:
    name: sys-stk-full
  vars:
    docker_compose_flush_handlers: true
    docker_git_repository_address: "{{ HUGO_SOURCE_REPO }}"
    docker_git_repository_pull:    true
    docker_git_repository_version: "{{ HUGO_SOURCE_REF }}"

- include_tasks: utils/once/flag.yml
