---
domains:
  canonical:
    - hugo.{{ DOMAIN_PRIMARY }}
  aliases: []
csp:
  flags:
    style-src-attr:
      unsafe-inline: true
    style-src-elem:
      unsafe-inline: true
    script-src:
      unsafe-eval: true
    script-src-elem:
      unsafe-inline: true
    script-src-attr:
      unsafe-inline: true
  whitelist:
    script-src-elem:
      - https://www.googletagmanager.com # nocheck: url — script CDN, bare domain returns 404 by design
    script-src:
      - https://www.googletagmanager.com # nocheck: url
networks:
  local:
    subnet: 192.168.105.80/28
