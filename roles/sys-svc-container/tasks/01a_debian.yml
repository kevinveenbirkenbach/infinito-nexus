- name: Ensure Docker apt key and sources are consistent
  ansible.builtin.script:
    cmd: >-
      {{ role_path }}/files/apt_repo.sh
      ensure-key-and-sanitize
      {{ SYS_SVC_CONTAINER_DOCKER_REPO_DISTRO_BY_DISTRIBUTION[ansible_distribution] }}
      1
    executable: /bin/bash
  register: sys_svc_container_docker_repo_setup
  changed_when: "'changed=1' in sys_svc_container_docker_repo_setup.stdout"

- name: Configure Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ SYS_SVC_CONTAINER_DPKG_ARCH_BY_ANSIBLE_ARCH.get(ansible_architecture, ansible_architecture) }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ SYS_SVC_CONTAINER_DOCKER_REPO_DISTRO_BY_DISTRIBUTION[ansible_distribution] }}
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
    update_cache: true
