---
- name: Include dependency 'sys-svc-webserver-https'
  include_role:
    name: sys-svc-webserver-https
  vars:
    compose_handlers_flush: true

- include_tasks: utils/once/flag.yml
  when: run_once_web_opt_rdr_domains is not defined

- name: "Include domains redirects"
  include_tasks: redirect-domain.yml
  vars:
    domain: "{{ item.source }}"
    target: "{{ item.target }}"
  loop: "{{ redirect_domain_mappings }}"
