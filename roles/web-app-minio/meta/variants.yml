# Matrix-deploy variant overrides for this role (requirement 013
# alpha-to-beta promotion). Variant 0 is the canonical OIDC variant
# (default). Variant 1 flips the role onto the LDAP variant so the
# `oidc`/`ldap` Playwright variants both run end-to-end.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# variant 0: OIDC variant (canonical default).
- {}

# variant 1: LDAP variant. Disable OIDC and enable LDAP so the
# integrated LDAP login path is exercised by Playwright.
- services:
    oidc:
      enabled: false
    ldap:
      enabled: true
