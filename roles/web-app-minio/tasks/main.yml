---
- name: "load docker and db for {{ application_id }}"
  include_role:
    name: sys-stk-backend
  vars:
    docker_compose_flush_handlers:        true
    docker_git_repository_pull:           false

- name: "Include role sys-stk-front-proxy for '{{ application_id }}'"
  include_role:
    name: sys-stk-front-proxy
  vars:
    domain:    "{{ minio_proxy.domain }}"
    http_port: "{{ minio_proxy.http_port }}"
  loop: "{{ MINIO_FRONT_PROXY_MATRIX }}"
  loop_control:
    loop_var: minio_proxy
    label: "{{ minio_proxy.domain }} -> {{ minio_proxy.http_port }}"

- block:
    # mc URL-embedded credentials (`MC_HOST_<alias>=https://USER:PASS@host`)
    # are NOT URL-decoded by mc when read from the environment, while the
    # MinIO server stores the URL-decoded password. With administrator
    # credentials containing $ / € / ! / ' the two sides disagree and every
    # admin call fails with "request signature we calculated does not
    # match". Authenticate via `mc alias set` with explicit args instead;
    # mc applies the credentials verbatim, matching the server.

    # MinIO finishes booting its IAM subsystem (where policies and the
    # OIDC IdP live) AFTER `mc admin info` already reports the server
    # as up. Probing IAM directly via `mc admin policy ls` is the only
    # readiness signal that matches what the policy admin API needs;
    # `mc admin info` returns rc=0 in a window where the very next
    # `mc admin policy info` still fails with `Server not initialized
    # yet, please try again.`.
    - name: "Wait for MinIO IAM subsystem to finish initializing"
      environment:
        MINIO_ROOT_USER: "{{ lookup('users', 'administrator').username }}"
        MINIO_ROOT_PASSWORD: "{{ lookup('users', 'administrator').password }}"
      shell: |
        set -euo pipefail
        container run --rm \
            -e MINIO_ROOT_USER \
            -e MINIO_ROOT_PASSWORD \
            --entrypoint /bin/sh \
            {{ MINIO_MC_IMAGE }} \
            -c 'mc alias set minio {{ MINIO_API_URL | quote }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null \
                && mc admin policy ls minio'
      args: { executable: /bin/bash }
      register: mc_admin_policy_ls
      retries: 60
      delay: 5
      until: mc_admin_policy_ls.rc == 0
      changed_when: false
      no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

    # Register the OIDC provider under the explicit name `keycloak`
    # via `mc idp openid add`. The Console's login page only renders
    # the SSO button for NAMED providers (its
    # `redirectRules` field is built from named entries only); the
    # legacy `MINIO_IDENTITY_OPENID_*` env-var form registers the
    # provider as nameless `(default)` and the SSO button never
    # appears, even when the server-side IdP is fully functional.
    - name: "Register Keycloak as named OIDC IdP on MinIO"
      no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
      # All `mc idp openid add` parameters are passed to the inner sh
      # via env vars rather than inline-quoted args. The display name
      # contains parentheses (e.g. `SSO Login (INFINITO.EXAMPLE)`) and
      # any inline shell-quoting at this nesting depth (Ansible shell
      # → container run -c → inner sh) lets bash interpret `(` as a
      # command-grouping start. Env-passthrough side-steps that
      # entirely.
      environment:
        MINIO_ROOT_USER: "{{ lookup('users', 'administrator').username }}"
        MINIO_ROOT_PASSWORD: "{{ lookup('users', 'administrator').password }}"
        MINIO_OIDC_CONFIG_URL: "{{ OIDC.CLIENT.DISCOVERY_DOCUMENT }}"
        MINIO_OIDC_CLIENT_ID: "{{ OIDC.CLIENT.ID }}"
        MINIO_OIDC_CLIENT_SECRET: "{{ OIDC.CLIENT.SECRET }}"
        MINIO_OIDC_DISPLAY_NAME: "{{ OIDC.BUTTON_TEXT }}"
        MINIO_OIDC_CLAIM_NAME: "{{ RBAC.GROUP.CLAIM }}"
      shell: |
        set -euo pipefail
        container run --rm \
            -e MINIO_ROOT_USER \
            -e MINIO_ROOT_PASSWORD \
            -e MINIO_OIDC_CONFIG_URL \
            -e MINIO_OIDC_CLIENT_ID \
            -e MINIO_OIDC_CLIENT_SECRET \
            -e MINIO_OIDC_DISPLAY_NAME \
            -e MINIO_OIDC_CLAIM_NAME \
            --entrypoint /bin/sh \
            {{ MINIO_MC_IMAGE }} \
            -c 'mc alias set minio {{ MINIO_API_URL | quote }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null \
                && mc idp openid add minio keycloak \
                    "config_url=$MINIO_OIDC_CONFIG_URL" \
                    "client_id=$MINIO_OIDC_CLIENT_ID" \
                    "client_secret=$MINIO_OIDC_CLIENT_SECRET" \
                    "display_name=$MINIO_OIDC_DISPLAY_NAME" \
                    "claim_name=$MINIO_OIDC_CLAIM_NAME" \
                    scopes=openid,profile,email,groups \
                    redirect_uri_dynamic=on'
      args: { executable: /bin/bash }
      register: mc_idp_add
      changed_when: '"Successfully" in (mc_idp_add.stdout | default("")) or "Successfully" in (mc_idp_add.stderr | default(""))'
      failed_when:
        - mc_idp_add.rc != 0
        - '"already exists" not in (mc_idp_add.stderr | default(""))'

    - name: "Restart MinIO so the named OIDC IdP is picked up by the Console"
      environment:
        MINIO_ROOT_USER: "{{ lookup('users', 'administrator').username }}"
        MINIO_ROOT_PASSWORD: "{{ lookup('users', 'administrator').password }}"
      shell: |
        set -euo pipefail
        container run --rm \
            -e MINIO_ROOT_USER \
            -e MINIO_ROOT_PASSWORD \
            --entrypoint /bin/sh \
            {{ MINIO_MC_IMAGE }} \
            -c 'mc alias set minio {{ MINIO_API_URL | quote }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null \
                && mc admin service restart minio --json'
      args: { executable: /bin/bash }
      register: mc_admin_service_restart
      changed_when: mc_admin_service_restart.rc == 0
      no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
      when: mc_idp_add.changed | bool

    - name: "Wait for MinIO IAM subsystem to come back after restart"
      environment:
        MINIO_ROOT_USER: "{{ lookup('users', 'administrator').username }}"
        MINIO_ROOT_PASSWORD: "{{ lookup('users', 'administrator').password }}"
      shell: |
        set -euo pipefail
        container run --rm \
            -e MINIO_ROOT_USER \
            -e MINIO_ROOT_PASSWORD \
            --entrypoint /bin/sh \
            {{ MINIO_MC_IMAGE }} \
            -c 'mc alias set minio {{ MINIO_API_URL | quote }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null \
                && mc admin policy ls minio'
      args: { executable: /bin/bash }
      register: mc_admin_policy_ls_after_restart
      retries: 60
      delay: 5
      until: mc_admin_policy_ls_after_restart.rc == 0
      changed_when: false
      no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
      when: mc_idp_add.changed | bool

    - name: "Check policy (RAW with slash) exists"
      no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
      environment:
        MINIO_ROOT_USER: "{{ lookup('users', 'administrator').username }}"
        MINIO_ROOT_PASSWORD: "{{ lookup('users', 'administrator').password }}"
      shell: |
        set -euo pipefail
        container run --rm \
            -e MINIO_ROOT_USER \
            -e MINIO_ROOT_PASSWORD \
            --entrypoint /bin/sh \
            {{ MINIO_MC_IMAGE }} \
            -c 'mc alias set minio {{ MINIO_API_URL | quote }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null \
                && mc admin policy info minio {{ MINIO_OIDC_POLICY_NAME | quote }}'
      args: { executable: /bin/bash }
      register: mc_policy_info_raw
      failed_when: false
      changed_when: false

    - name: "Create policy (RAW with slash) if missing"
      environment:
        MINIO_ROOT_USER: "{{ lookup('users', 'administrator').username }}"
        MINIO_ROOT_PASSWORD: "{{ lookup('users', 'administrator').password }}"
      shell: |
        set -euo pipefail
        printf '%s' '{{ (MINIO_OIDC_POLICY_CONTENT | from_yaml | to_json) | b64encode }}' \
          | base64 -d \
          | container run --rm -i \
              -e MINIO_ROOT_USER \
              -e MINIO_ROOT_PASSWORD \
              --entrypoint /bin/sh \
              {{ MINIO_MC_IMAGE }} \
              -c 'mc alias set minio {{ MINIO_API_URL | quote }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null \
                  && mc admin policy create minio {{ MINIO_OIDC_POLICY_NAME | quote }} /dev/stdin'
      args: { executable: /bin/bash }
      no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
      async: "{{ ASYNC_TIME if ASYNC_ENABLED | bool else omit }}"
      poll:  "{{ ASYNC_POLL if ASYNC_ENABLED | bool else omit }}"
      when:
        - mc_policy_info_raw.rc != 0

  when: MINIO_OIDC_ENABLED | bool

# When LDAP is the active auth backend (variant 1), MinIO STS rejects
# any login whose LDAP user / group is not bound to a policy with
# `expecting a policy to be set for user ... or one of their groups`.
# Bind the same `roles/<role>/administrator` policy to the project's
# `cn=web-app-minio-administrator,ou=roles,...` group so every user
# placed in that group (including the `administrator` persona used by
# the Playwright spec) can authenticate against the Console form.
- block:
    - name: "Wait for MinIO IAM subsystem before policy attach"
      environment:
        MINIO_ROOT_USER: "{{ lookup('users', 'administrator').username }}"
        MINIO_ROOT_PASSWORD: "{{ lookup('users', 'administrator').password }}"
      shell: |
        set -euo pipefail
        container run --rm \
            -e MINIO_ROOT_USER \
            -e MINIO_ROOT_PASSWORD \
            --entrypoint /bin/sh \
            {{ MINIO_MC_IMAGE }} \
            -c 'mc alias set minio {{ MINIO_API_URL | quote }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null \
                && mc admin policy ls minio'
      args: { executable: /bin/bash }
      register: mc_admin_policy_ls_ldap
      retries: 60
      delay: 5
      until: mc_admin_policy_ls_ldap.rc == 0
      changed_when: false
      no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

    - name: "Create administrator policy (LDAP variant)"
      environment:
        MINIO_ROOT_USER: "{{ lookup('users', 'administrator').username }}"
        MINIO_ROOT_PASSWORD: "{{ lookup('users', 'administrator').password }}"
      shell: |
        set -euo pipefail
        printf '%s' '{{ (MINIO_OIDC_POLICY_CONTENT | from_yaml | to_json) | b64encode }}' \
          | base64 -d \
          | container run --rm -i \
              -e MINIO_ROOT_USER \
              -e MINIO_ROOT_PASSWORD \
              --entrypoint /bin/sh \
              {{ MINIO_MC_IMAGE }} \
              -c 'mc alias set minio {{ MINIO_API_URL | quote }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null \
                  && mc admin policy create minio {{ MINIO_OIDC_POLICY_NAME | quote }} /dev/stdin || true'
      args: { executable: /bin/bash }
      changed_when: false
      no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

    - name: "Attach MinIO policy to LDAP administrator group"
      environment:
        MINIO_ROOT_USER: "{{ lookup('users', 'administrator').username }}"
        MINIO_ROOT_PASSWORD: "{{ lookup('users', 'administrator').password }}"
        MINIO_LDAP_ADMIN_GROUP_DN: "cn=web-app-minio-administrator,ou=roles,{{ LDAP.DN.ROOT }}"
      shell: |
        set -euo pipefail
        container run --rm \
            -e MINIO_ROOT_USER \
            -e MINIO_ROOT_PASSWORD \
            -e MINIO_LDAP_ADMIN_GROUP_DN \
            --entrypoint /bin/sh \
            {{ MINIO_MC_IMAGE }} \
            -c 'mc alias set minio {{ MINIO_API_URL | quote }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null \
                && mc admin policy attach minio {{ MINIO_OIDC_POLICY_NAME | quote }} --group "$MINIO_LDAP_ADMIN_GROUP_DN"'
      args: { executable: /bin/bash }
      register: mc_policy_attach_ldap
      changed_when: '"already attached" not in (mc_policy_attach_ldap.stderr | default(""))'
      failed_when:
        - mc_policy_attach_ldap.rc != 0
        - '"already attached" not in (mc_policy_attach_ldap.stderr | default(""))'
      no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

  when: MINIO_LDAP_ENABLED | bool
