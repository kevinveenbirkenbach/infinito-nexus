oidc:
  enabled: false
  shared: false
logout:
  enabled: true
  shared: true
dashboard:
  enabled: true
  shared: true
matomo:
  enabled: true
  shared: true
email:
  enabled: true
  shared: true
ldap:
  enabled: true
  shared: true
oauth2:
  origin:
    host: kix-proxy
    port: '80'
  enabled: true
  shared: true
  allowed_groups:
  - 'roles/web-app-kix/administrator'
  - 'roles/web-app-kix/user'
css:
  enabled: false
  shared: true
prometheus:
  enabled: true
  shared: true
# noqa: shared
postgres:
  enabled: false
  shared: false
redis:
  enabled: true
  shared: true
kix:
  image: docker-registry.kixdesk.com/public/proxy
  version: stable
  min_storage: 10GB
  ports:
    local:
      http: 8071
      oauth2: 16493
  run_after:
  - web-app-keycloak
  lifecycle: pre-alpha
  cpus: '0.5'
  mem_reservation: 512m
  mem_limit: 1g
  pids_limit: 512
backend:
  image: docker-registry.kixdesk.com/public/backend
  version: stable
  min_storage: 5GB
  cpus: '1.5'
  mem_reservation: 2g
  mem_limit: 4g
  pids_limit: 1024
frontend:
  image: docker-registry.kixdesk.com/public/frontend
  version: stable
  min_storage: 2GB
  cpus: '0.5'
  mem_reservation: 512m
  mem_limit: 1g
  pids_limit: 512
db:
  image: docker-registry.kixdesk.com/public/db
  version: stable
  min_storage: 5GB
  cpus: '0.5'
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 512
