oidc:
  enabled: false
  shared: false
ldap:
  enabled: false
  shared: false
oauth2:
  # BookWyrm has no first-party OIDC adapter. Per requirement 013 the
  # project uses `web-app-oauth2-proxy` in front of the BookWyrm web
  # UI as the universal glue path.
  enabled: true
  shared: false
  origin:
    host: application
    port: 8000
  allowed_groups:
  - '{{ lookup(''rbac_group_path'', application_id=''web-app-bookwyrm'', role=''administrator'') }}'
logout:
  enabled: true
  shared: true
dashboard:
  enabled: true
  shared: true
matomo:
  enabled: true
  shared: true
email:
  enabled: true
  shared: true
postgres:
  enabled: true
  shared: true
# noqa: shared
redis:
  backup:
    disabled: true
  enabled: true
bookwyrm:
  version: v0.7.5
  name: bookwyrm
  repository: https://github.com/bookwyrm-social/bookwyrm.git
  min_storage: 15GB
  base_image: python
  base_version: 3.11-bookworm
  registration_open: false
  allow_invite_request: false
  ports:
    local:
      http: 8049
      oauth2: 16498
  run_after:
  - web-app-matomo
  - web-app-keycloak
  - web-app-mailu
  lifecycle: beta
# noqa: shared
worker:
  enabled: true
css:
  enabled: true
  shared: true
prometheus:
  enabled: true
  shared: true
