oauth2:
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  origin:
    host: application
    port: 8000
  allowed_groups:
  - '{{ lookup(''rbac_group_path'', application_id=''web-app-bookwyrm'', role=''administrator'') }}'
logout:
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
postgres:
  enabled: true  # nocheck: dynamic-flag
  shared: "{{ 'svc-db-postgres' in group_names }}"
# noqa: shared
# nocheck: dynamic-flag
redis:
  backup:
    disabled: true
  enabled: true
bookwyrm:
  version: v0.7.5
  name: bookwyrm
  repository: https://github.com/bookwyrm-social/bookwyrm.git
  min_storage: 15GB
  base_image: python
  base_version: 3.11-bookworm
  registration_open: false
  allow_invite_request: false
  ports:
    local:
      http: 8049
      oauth2: 16498
  run_after:
  - web-app-matomo
  - web-app-keycloak
  - web-app-mailu
  lifecycle: beta
# noqa: shared
# nocheck: dynamic-flag
worker:
  enabled: true
# nocheck: dynamic-flag
css:
  enabled: true
  shared: true
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
