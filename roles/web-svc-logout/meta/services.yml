---
# nocheck: playwright-service-flag — self-provider; injection presence is asserted per consumer via roles_with_service('logout')
logout:
  enabled: true
  shared: true
  image: ghcr.io/kevinveenbirkenbach/universal-logout
  version: latest
  name: logout
  min_storage: 1GB
  cpus: 0.2
  mem_reservation: 256m
  mem_limit: 512m
  pids_limit: 128
  ports:
    local:
      http: 8048
  lifecycle: beta
# nocheck: playwright-service-flag — web-svc-logout has no user-facing surface; matomo/css/javascript injection is asserted by the respective provider's spec
matomo:
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
# nocheck: playwright-service-flag — web-svc-logout has no user-facing surface; CSS injection is asserted on the consuming role surfaces
css:
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — web-svc-logout has no user-facing surface; JS injection is asserted on the consuming role surfaces
javascript:
  enabled: false
  shared: true
prometheus:
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
