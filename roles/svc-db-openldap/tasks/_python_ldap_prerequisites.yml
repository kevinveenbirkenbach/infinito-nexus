- name: Resolve python-ldap native library packages for current OS family
  ansible.builtin.set_fact:
    openldap_python_ldap_native_lib_packages: >-
      {{
        OPENLDAP_PYTHON_LDAP_NATIVE_LIB_PACKAGES_BY_OS_FAMILY.get(ansible_os_family, [])
      }}
  changed_when: false

- name: Install python-ldap native library build dependencies
  ansible.builtin.package:
    name: "{{ openldap_python_ldap_native_lib_packages }}"
    state: present
  when: openldap_python_ldap_native_lib_packages | length > 0

- name: Resolve Python include directory for active interpreter
  ansible.builtin.command:
    argv:
      - "{{ ansible_python_interpreter }}"
      - -c
      - import sysconfig; print(sysconfig.get_paths()['include'])
  register: openldap_python_include_dir
  changed_when: false

- name: Set Python.h path for active interpreter
  ansible.builtin.set_fact:
    openldap_python_header_path: "{{ (openldap_python_include_dir.stdout | trim) ~ '/Python.h' }}"
  changed_when: false

- name: Check whether Python.h exists for active interpreter
  ansible.builtin.stat:
    path: "{{ openldap_python_header_path }}"
  register: openldap_python_header
