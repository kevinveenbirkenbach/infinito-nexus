- block:

  - name: Include dependency 'sys-pip'
    include_role:
      name: sys-pip
    when: run_once_sys_pip is not defined

  - name: Sanitize conflicting Docker apt sources on Debian/Ubuntu
    ansible.builtin.script:
      cmd: >-
        {{ role_path }}/../sys-svc-container/files/apt_repo.sh
        sanitize-sources
        {{ ansible_distribution | lower }}
        1
      executable: /bin/bash
    register: dev_python_docker_repo_cleanup
    changed_when: "'changed=1' in dev_python_docker_repo_cleanup.stdout"
    become: true
    when: ansible_distribution in ['Debian', 'Ubuntu']

  - name: Install and prefer Python 3.11+ as default
    ansible.builtin.script: "{{ role_path }}/files/install.sh"
    environment:
      SKIP_DOCKER_APT_SANITIZER: "1"
    become: true

  - include_tasks: utils/once/flag.yml

  when: run_once_dev_python is not defined
