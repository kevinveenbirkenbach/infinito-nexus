---
# This task file applies OpenProject settings safely.
# It waits for the web container to be running, ensures migrations are applied,
# then sets all configured settings via rails runner fed from STDIN (robust quoting).

- name: Wait until OpenProject web container is running
  shell: >
    container inspect -f '{{"{{"}}.State.Status{{"}}"}}' {{ OPENPROJECT_WEB_CONTAINER }}
  register: openproject_web_state
  retries: 60
  delay: 5
  until: openproject_web_state.stdout.strip() == "running"
  changed_when: false

- name: Run database migrations (with diagnostics)
  block:
    - name: Temporarily stop OpenProject worker/cron/seeder during migrations
      shell: >
        {{ BIN_COMPOSE }} stop worker cron seeder
      args:
        chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
      register: openproject_stop_aux
      changed_when: false
      failed_when: false

    - name: Run database migrations
      shell: >
        {{ BIN_COMPOSE }} exec -T {{ OPENPROJECT_WEB_SERVICE }} bash -lc
        "cd /app && RAILS_ENV=production bin/rails db:migrate"
      args:
        chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
      register: openproject_migrate
      retries: 30
      delay: 10
      until: openproject_migrate.rc == 0
      notify: compose up
  rescue:
    - name: Collect OpenProject status after migration failure
      shell: >
        {{ BIN_COMPOSE }} ps
      args:
        chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
      register: openproject_migrate_ps
      changed_when: false
      failed_when: false

    - name: Collect OpenProject web container state after migration failure
      shell: >
        container inspect -f
        'status={{"{{"}}.State.Status{{"}}"}} exit={{"{{"}}.State.ExitCode{{"}}"}} oom={{"{{"}}.State.OOMKilled{{"}}"}} error={{"{{"}}.State.Error{{"}}"}}'
        {{ OPENPROJECT_WEB_CONTAINER }}
      args:
        chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
      register: openproject_migrate_container_state
      changed_when: false
      failed_when: false

    - name: Collect OpenProject logs after migration failure
      shell: >
        {{ BIN_COMPOSE }} logs --tail=300
      args:
        chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
      register: openproject_migrate_logs
      changed_when: false
      failed_when: false

    - name: Abort with OpenProject migration diagnostics
      fail:
        msg: |-
          OpenProject migrations failed after retries.
          Last migration rc: {{ openproject_migrate.rc | default('unknown') }}

          compose ps:
          {{ openproject_migrate_ps.stdout | default('<no output>') }}

          web container state:
          {{ openproject_migrate_container_state.stdout | default('<no output>') }}

          compose logs (tail 300):
          {{ openproject_migrate_logs.stdout | default('<no output>') }}
          {{ openproject_migrate_logs.stderr | default('') }}

- name: Flush handlers to start OpenProject worker/cron/seeder after migrations
  meta: flush_handlers

- name: Wait until OpenProject web container is running (after migrations)
  shell: >
    container inspect -f '{{"{{"}}.State.Status{{"}}"}}' {{ OPENPROJECT_WEB_CONTAINER }}
  register: openproject_web_state_after_migrate
  retries: 60
  delay: 5
  until: openproject_web_state_after_migrate.stdout.strip() == "running"
  changed_when: false

- name: Set settings in OpenProject (rails runner via STDIN; robust quoting + booleans)
  shell: >
    {{ BIN_COMPOSE }} exec {{ OPENPROJECT_WEB_SERVICE }} bash -lc
    "cd /app && cat | bundle exec rails runner -"
  args:
    chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
    stdin: |
      {% for kv in (OPENPROJECT_RAILS_SETTINGS | dict2items) %}
      Setting[:{{ kv.key }}] = {{ kv.value | to_json }}
      {% endfor %}
  register: openproject_apply_settings
  retries: 30
  delay: 5
  until: openproject_apply_settings.rc == 0
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
